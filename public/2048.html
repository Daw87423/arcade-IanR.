<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<script>if(!localStorage.getItem('arcade_token'))location.replace('index.html');</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap');
:root{
  --bg:#13151d; --grid:#1d2030; --empty:#262a3d; --ink:#f4f6ff; --mute:#8b91ad;
  --accent:#ffb14e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Space Grotesk',sans-serif;background:radial-gradient(120% 90% at 50% -10%, #21263a, var(--bg) 60%);
  color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;
}
.wrap{width:100%;max-width:420px}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.title{font-weight:700;font-size:44px;letter-spacing:-.02em}
.title b{color:var(--accent)}
.scores{display:flex;gap:10px}
.sc{background:var(--grid);border-radius:12px;padding:8px 16px;text-align:center;min-width:74px}
.sc .lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}
.sc .val{font-size:22px;font-weight:700}
.intro{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.intro p{color:var(--mute);font-size:13px}
.btn{cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;background:var(--accent);color:#3a2200;border:none;border-radius:10px;padding:11px 16px;white-space:nowrap}
.btn:active{transform:scale(.98)}
.board{position:relative;background:var(--grid);border-radius:14px;padding:10px;touch-action:none;aspect-ratio:1}
.cells,.tiles{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:10px;position:absolute;inset:10px}
.cell{background:var(--empty);border-radius:9px}
.tile{display:flex;align-items:center;justify-content:center;border-radius:9px;font-weight:700;
  font-size:clamp(20px,7vw,34px);animation:pop .14s ease}
@keyframes pop{from{transform:scale(.7);opacity:.4}to{transform:scale(1);opacity:1}}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(19,21,29,.88);border-radius:14px;gap:6px;text-align:center;padding:20px}
.overlay.hide{display:none}
.ov-t{font-size:30px;font-weight:700}
.ov-s{color:var(--mute);font-size:14px}
.hint{text-align:center;color:var(--mute);font-size:12.5px;margin-top:14px}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
</style>
</head>
<body>
<a href="index.html" aria-label="Retour au menu" style="position:fixed;top:12px;left:12px;z-index:99;font-family:system-ui,-apple-system,'Space Grotesk',sans-serif;font-size:13px;font-weight:700;text-decoration:none;color:#e8f0ff;background:rgba(20,22,30,.66);border:1px solid rgba(255,255,255,.18);padding:7px 13px;border-radius:10px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);box-shadow:0 4px 16px rgba(0,0,0,.35)">← Menu</a>
<div class="wrap">
  <div class="head">
    <div class="title">2<b>0</b>48</div>
    <div class="scores">
      <div class="sc"><div class="lab">Score</div><div class="val" id="score">0</div></div>
      <div class="sc"><div class="lab">Record</div><div class="val" id="best">0</div></div>
    </div>
  </div>
  <div class="intro">
    <p>Combine les tuiles identiques pour atteindre <b style="color:var(--accent)">2048</b>.</p>
    <button class="btn" id="new">Nouvelle partie</button>
  </div>
  <div class="board">
    <div class="cells" id="cells"></div>
    <div class="tiles" id="tiles"></div>
    <div class="overlay hide" id="ov"><div class="ov-t" id="ovT"></div><div class="ov-s" id="ovS"></div><button class="btn" id="ovBtn" style="margin-top:8px">Rejouer</button></div>
  </div>
  <div class="hint">Flèches ou ZQSD · glisse du doigt sur mobile</div>
</div>
<script src="auth.js"></script>
<script>
const SIZE=4;
const COLORS={
  2:['#2f3650','#cdd6f4'],4:['#3a4468','#cdd6f4'],8:['#4f7cff','#fff'],16:['#3aa0ff','#fff'],
  32:['#22c1a6','#fff'],64:['#3ed16f','#0a2912'],128:['#ffd24a','#3a2a00'],256:['#ffac3b','#3a2200'],
  512:['#ff7a3d','#fff'],1024:['#ff4d6d','#fff'],2048:['#ff2e63','#fff']
};
let board, score, best=0, won, over;
const cellsEl=document.getElementById('cells'), tilesEl=document.getElementById('tiles'),
      scoreEl=document.getElementById('score'), bestEl=document.getElementById('best'),
      ov=document.getElementById('ov'), ovT=document.getElementById('ovT'), ovS=document.getElementById('ovS');

for(let i=0;i<SIZE*SIZE;i++){const d=document.createElement('div');d.className='cell';cellsEl.appendChild(d);}

function newGame(){
  board=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  score=0; won=false; over=false; ov.classList.add('hide');
  addTile(); addTile(); update();
}
function addTile(){
  const empty=[];
  board.forEach((r,y)=>r.forEach((v,x)=>{if(v===0)empty.push([y,x]);}));
  if(!empty.length) return;
  const [y,x]=empty[Math.random()*empty.length|0];
  board[y][x]=Math.random()<0.9?2:4;
}
function update(){
  tilesEl.innerHTML='';
  board.forEach(r=>r.forEach(v=>{
    const t=document.createElement('div');
    if(v){const[bg,fg]=COLORS[v]||['#ff2e63','#fff'];t.className='tile';t.style.background=bg;t.style.color=fg;
      t.textContent=v;t.style.fontSize=v>=1024?'clamp(16px,5.5vw,26px)':'';}
    else t.className='tile';t.style.background=v?t.style.background:'transparent';t.style.animation=v?'':'none';
    tilesEl.appendChild(t);
  }));
  scoreEl.textContent=score;
  if(score>best){best=score;bestEl.textContent=best;scheduleSave2048();}
}
function slide(row){
  let arr=row.filter(v=>v);
  for(let i=0;i<arr.length-1;i++){
    if(arr[i]===arr[i+1]){arr[i]*=2;score+=arr[i];if(arr[i]===2048)won=true;arr.splice(i+1,1);}
  }
  while(arr.length<SIZE)arr.push(0);
  return arr;
}
function rotate(b){ // rotation horaire
  const n=Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++)n[x][SIZE-1-y]=b[y][x];
  return n;
}
function move(dir){
  if(over) return;
  const before=JSON.stringify(board);
  let times={left:0,up:3,right:2,down:1}[dir];
  for(let i=0;i<times;i++)board=rotate(board);
  board=board.map(slide);
  for(let i=0;i<(4-times)%4;i++)board=rotate(board);
  if(JSON.stringify(board)!==before){ addTile(); update(); checkEnd(); }
}
function movesLeft(){
  for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
    if(board[y][x]===0)return true;
    if(x<SIZE-1&&board[y][x]===board[y][x+1])return true;
    if(y<SIZE-1&&board[y][x]===board[y+1][x])return true;
  }
  return false;
}
function checkEnd(){
  if(won){ovT.textContent='Gagné ! 🎉';ovS.textContent='Tu as atteint 2048. Continue pour battre ton record !';ov.classList.remove('hide');won=false;document.getElementById('ovBtn').textContent='Continuer';document.getElementById('ovBtn').onclick=()=>ov.classList.add('hide');return;}
  if(!movesLeft()){over=true;ovT.textContent='Perdu';ovS.textContent='Plus aucun mouvement possible. Score : '+score;ov.classList.remove('hide');document.getElementById('ovBtn').textContent='Rejouer';document.getElementById('ovBtn').onclick=newGame;}
}
document.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  const map={arrowleft:'left',q:'left',arrowright:'right',d:'right',arrowup:'up',z:'up',arrowdown:'down',s:'down'};
  if(map[k]){e.preventDefault();move(map[k]);}
});
const board_el=document.querySelector('.board');
let sx,sy;
board_el.addEventListener('touchstart',e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;},{passive:true});
board_el.addEventListener('touchend',e=>{
  const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up');
});
document.getElementById('new').onclick=newGame;
document.getElementById('ovBtn').onclick=newGame;
let save2048Timer=null;
function scheduleSave2048(){ clearTimeout(save2048Timer); save2048Timer=setTimeout(()=>Arcade.saveBest('2048',best),800); }
newGame();
Arcade.loadBest('2048').then(b=>{ if(b>best){ best=b; bestEl.textContent=b; } });
</script>
</body>
</html>
