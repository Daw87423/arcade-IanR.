<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<script>if(!localStorage.getItem('arcade_token'))location.replace('index.html');</script>
<title>Astéroïdes</title>
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;touch-action:none}
canvas{display:block}
/* Commandes mobiles */
.ctrl{display:flex;justify-content:space-between;align-items:center;
  width:100%;max-width:480px;padding:6px 14px;gap:6px}
.ctrl-grp{display:flex;gap:7px}
.cbtn{cursor:pointer;background:rgba(57,255,158,.07);border:1.5px solid rgba(57,255,158,.3);
  border-radius:12px;color:#39ff9e;font-size:20px;
  width:52px;height:52px;display:flex;align-items:center;justify-content:center;
  touch-action:none;-webkit-user-select:none;user-select:none;transition:background .1s}
.cbtn:active,.cbtn.on{background:rgba(57,255,158,.22)}
.cbtn.fire{background:rgba(255,255,100,.08);border-color:rgba(255,255,100,.4);
  color:#ffff88;font-size:13px;font-weight:700;width:64px;letter-spacing:.05em}
.cbtn.fire:active,.cbtn.fire.on{background:rgba(255,255,100,.22)}
</style>
</head>
<body>
<a href="index.html" class="back" style="position:fixed;top:10px;left:10px;z-index:99;font-size:13px;font-weight:700;text-decoration:none;color:#e8f0ff;background:rgba(20,22,30,.66);border:1px solid rgba(255,255,255,.18);padding:7px 13px;border-radius:10px;backdrop-filter:blur(6px)">← Menu</a>
<canvas id="cv"></canvas>
<div class="ctrl" id="ctrl">
  <div class="ctrl-grp">
    <div class="cbtn" id="btnL">◀</div>
    <div class="cbtn" id="btnR">▶</div>
  </div>
  <div class="ctrl-grp">
    <div class="cbtn" id="btnT">▲</div>
    <div class="cbtn fire" id="btnF">FEU</div>
  </div>
</div>
<script src="auth.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   ASTÉROÏDES — physique inertielle vectorielle
   • Rotation + propulsion (drift libre, légère résistance)
   • 3 tailles d'astéroïdes, se fracturent en 2 au tir
   • Invincibilité temporaire après mort (clignotement)
   • Vie bonus toutes les 10 000 pts · Wrap-around
   • Particules d'explosion · Niveaux infinis
   • Clavier (↑←→ ou ZQSD) + boutons mobiles
   ════════════════════════════════════════════════════════════ */

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ── Canvas : 480×480, mis à l'échelle CSS ──────────────────
const W = 480, H = 480;
cv.width = W; cv.height = H;

function resize(){
  const ctrlEl = document.getElementById('ctrl');
  const ctrlH  = ctrlEl ? ctrlEl.offsetHeight + 8 : 76;
  const s = Math.min(innerWidth/W, (innerHeight-ctrlH)/H);
  cv.style.width  = W*s + 'px';
  cv.style.height = H*s + 'px';
}
addEventListener('resize', resize); resize();

// ── Constantes physiques ───────────────────────────────────
const ROT_SPD  = 3.4;   // rad/s
const THRUST   = 240;   // px/s²
const MAX_SPD  = 370;   // px/s
const DRAG     = 0.016; // fraction perdue par tick (×60 fps)
const BULL_SPD = 500;   // px/s
const BULL_TTL = 1.35;  // secondes de vie d'un projectile
const MAX_BULL = 5;     // projectiles simultanés
const FIRE_CD  = 0.22;  // cooldown entre tirs
const BONUS_PTS= 10000; // vie bonus toutes les X pts

// Configs astéroïdes { r, pts, vitesse min-max, nb sommets }
const AST = {
  large : {r:45, pts:20,  sMin:35,  sMax:85,  nv:10},
  medium: {r:25, pts:50,  sMin:65,  sMax:135, nv:8 },
  small : {r:12, pts:100, sMin:115, sMax:195, nv:7 },
};
const NEXT = {large:'medium', medium:'small', small:null};

// ── Étoiles de fond (statiques) ────────────────────────────
const STARS = Array.from({length:80}, ()=>({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.3+0.2, a:Math.random()*.65+.25
}));

// ── État global ────────────────────────────────────────────
let ship, asts, bulls, parts;
let score, best, lives, level, nextBonus;
let fireCd, invT;
let phase; // 'idle' | 'play' | 'dead' | 'next'
let keys = {}, lastT = 0;

best = parseInt(localStorage.getItem('ast_best')||'0');
// Le record de la base prime s'il est plus élevé
if(window.Arcade){
  Arcade.loadBest('asteroides').then(b=>{ if(b && b>best) best=b; }).catch(()=>{});
}

// ── Constructeurs ──────────────────────────────────────────
function mkShip(){
  return {x:W/2,y:H/2,vx:0,vy:0,angle:-Math.PI/2,r:11,thrusting:false};
}

function mkAst(x,y,size){
  const c=AST[size];
  const nv=c.nv+Math.floor(Math.random()*4);
  const verts=Array.from({length:nv},(_,i)=>{
    const a=(i/nv)*Math.PI*2, r=c.r*(0.6+Math.random()*.8);
    return [Math.cos(a)*r, Math.sin(a)*r];
  });
  const spd=c.sMin+Math.random()*(c.sMax-c.sMin);
  const ang=Math.random()*Math.PI*2;
  return {x,y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
    rot:0, rotSpd:(Math.random()-.5)*2, size, r:c.r, verts};
}

function splitAst(a){
  const next=NEXT[a.size]; if(!next) return [];
  return [mkAst(a.x,a.y,next), mkAst(a.x,a.y,next)];
}

// ── Particules d'explosion ─────────────────────────────────
function burst(x,y,size){
  const n={large:14,medium:9,small:5}[size];
  const sMax={large:160,medium:220,small:260}[size];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=40+Math.random()*sMax;
    const life=0.35+Math.random()*.55;
    parts.push({x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life, maxLife:life, sz:1+Math.random()*2.5});
  }
}

// ── Init / niveau ──────────────────────────────────────────
function init(){
  score=0; lives=3; level=1; nextBonus=BONUS_PTS;
  bulls=[]; parts=[]; phase='idle';
  ship=mkShip(); asts=[];
}

function startLevel(){
  bulls=[]; parts=[];
  asts=[];
  const n=2+level;   // 3 au niveau 1, 4 au niveau 2, …
  for(let i=0;i<n;i++){
    let x,y;
    do{x=Math.random()*W; y=Math.random()*H;}
    while(Math.hypot(x-ship.x,y-ship.y)<130);
    asts.push(mkAst(x,y,'large'));
  }
  invT=2; fireCd=0; phase='play';
}

// ── Tir ───────────────────────────────────────────────────
function fire(){
  if(fireCd>0||bulls.length>=MAX_BULL) return;
  bulls.push({
    x:ship.x+Math.cos(ship.angle)*22,
    y:ship.y+Math.sin(ship.angle)*22,
    vx:ship.vx+Math.cos(ship.angle)*BULL_SPD,
    vy:ship.vy+Math.sin(ship.angle)*BULL_SPD,
    life:BULL_TTL
  });
  fireCd=FIRE_CD;
}

// ── Wrap-around ────────────────────────────────────────────
function wrap(v,m){ return v<0?v+m:v>m?v-m:v; }

// ── Mise à jour ────────────────────────────────────────────
function update(dt){
  if(phase!=='play') return;

  // Contrôles vaisseau
  const L=keys['ArrowLeft']||keys['q']||keys['a']||keys['_L'];
  const R=keys['ArrowRight']||keys['d']||keys['_R'];
  const T=keys['ArrowUp']||keys['z']||keys['w']||keys['_T'];
  const F=keys[' ']||keys['_F'];

  if(L) ship.angle -= ROT_SPD*dt;
  if(R) ship.angle += ROT_SPD*dt;

  ship.thrusting=!!T;
  if(T){
    ship.vx+=Math.cos(ship.angle)*THRUST*dt;
    ship.vy+=Math.sin(ship.angle)*THRUST*dt;
    const spd=Math.hypot(ship.vx,ship.vy);
    if(spd>MAX_SPD){ship.vx*=MAX_SPD/spd; ship.vy*=MAX_SPD/spd;}
  }
  // Légère résistance spatiale
  const drag=1-DRAG*dt*60;
  ship.vx*=drag; ship.vy*=drag;
  ship.x=wrap(ship.x+ship.vx*dt,W);
  ship.y=wrap(ship.y+ship.vy*dt,H);

  if(F) fire();
  fireCd=Math.max(0,fireCd-dt);
  invT=Math.max(0,invT-dt);

  // Projectiles
  for(let i=bulls.length-1;i>=0;i--){
    const b=bulls[i]; b.life-=dt;
    if(b.life<=0){bulls.splice(i,1);continue;}
    b.x=wrap(b.x+b.vx*dt,W); b.y=wrap(b.y+b.vy*dt,H);
  }

  // Astéroïdes
  for(const a of asts){
    a.x=wrap(a.x+a.vx*dt,W); a.y=wrap(a.y+a.vy*dt,H); a.rot+=a.rotSpd*dt;
  }

  // Collision projectile ↔ astéroïde
  outer:
  for(let bi=bulls.length-1;bi>=0;bi--){
    const b=bulls[bi];
    for(let ai=asts.length-1;ai>=0;ai--){
      const a=asts[ai];
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){
        score+=AST[a.size].pts;
        if(score>best){best=score;localStorage.setItem('ast_best',best);}
        // Vie bonus
        if(score>=nextBonus){lives++;nextBonus+=BONUS_PTS;}
        burst(a.x,a.y,a.size);
        asts.splice(ai,1,...splitAst(a));
        bulls.splice(bi,1);
        continue outer;
      }
    }
  }

  // Collision vaisseau ↔ astéroïde
  if(invT<=0){
    for(const a of asts){
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+ship.r){
        burst(ship.x,ship.y,'medium'); hitShip(); return;
      }
    }
  }

  // Particules
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.life-=dt;
    if(p.life<=0){parts.splice(i,1);continue;}
    p.x=wrap(p.x+p.vx*dt,W); p.y=wrap(p.y+p.vy*dt,H);
    p.vx*=1-0.7*dt; p.vy*=1-0.7*dt;
  }

  // Niveau suivant
  if(asts.length===0){
    level++; phase='next';
    setTimeout(()=>{ship=mkShip(); startLevel();}, 1600);
  }
}

function hitShip(){
  lives--; if(lives<=0){gameOver();return;}
  ship=mkShip(); invT=2.5;
}
function gameOver(){ phase='dead'; if(window.Arcade) Arcade.saveBest('asteroides', score); }

// ── Rendu ──────────────────────────────────────────────────
function draw(now){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // Étoiles
  for(const s of STARS){
    ctx.globalAlpha=s.a; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Particules
  for(const p of parts){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle='#4dd0ff';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Astéroïdes (avec wrap-around visuel)
  ctx.shadowBlur=8; ctx.shadowColor='#4dd0ff';
  ctx.strokeStyle='#4dd0ff'; ctx.lineWidth=1.8;
  for(const a of asts){
    // Décalages pour le wrap-around visuel
    const ox=[], oy=[];
    ox.push(0); if(a.x-a.r<0)ox.push(W); if(a.x+a.r>W)ox.push(-W);
    oy.push(0); if(a.y-a.r<0)oy.push(H); if(a.y+a.r>H)oy.push(-H);
    for(const dx of ox) for(const dy of oy){
      ctx.save();
      ctx.translate(a.x+dx,a.y+dy); ctx.rotate(a.rot);
      ctx.beginPath();
      ctx.moveTo(a.verts[0][0],a.verts[0][1]);
      for(let i=1;i<a.verts.length;i++) ctx.lineTo(a.verts[i][0],a.verts[i][1]);
      ctx.closePath(); ctx.stroke();
      ctx.restore();
    }
  }

  // Projectiles
  ctx.shadowBlur=7; ctx.shadowColor='#ffff99';
  ctx.fillStyle='#ffff99';
  for(const b of bulls){
    ctx.beginPath(); ctx.arc(b.x,b.y,2.8,0,Math.PI*2); ctx.fill();
  }

  // Vaisseau (clignote si invincible)
  const vis = phase==='play' && (invT<=0 || Math.floor(invT*7)%2===0);
  if(vis){
    const ox=[], oy=[];
    ox.push(0);
    if(ship.x<20)ox.push(W); if(ship.x>W-20)ox.push(-W);
    if(ship.y<20)oy.push(H); if(ship.y>H-20)oy.push(-H);
    for(const dx of ox) for(const dy of oy){
      ctx.save();
      ctx.translate(ship.x+dx,ship.y+dy); ctx.rotate(ship.angle);
      ctx.shadowBlur=12; ctx.shadowColor='#ffffff';

      // Flamme de propulsion
      if(ship.thrusting){
        const fl=9+Math.random()*16;
        ctx.fillStyle=Math.random()>.45?'#ff8a3d':'#ffee44';
        ctx.beginPath();
        ctx.moveTo(-8,-3.5); ctx.lineTo(-8-fl,0); ctx.lineTo(-8,3.5);
        ctx.closePath(); ctx.fill();
      }

      // Coque
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(20,0); ctx.lineTo(-12,-10);
      ctx.lineTo(-7,0); ctx.lineTo(-12,10);
      ctx.closePath(); ctx.stroke();

      ctx.restore();
    }
  }

  ctx.shadowBlur=0;
  drawUI(now);
}

function drawUI(now){
  // Score
  ctx.textAlign='left'; ctx.font='bold 22px "Courier New",monospace';
  ctx.fillStyle='#fff'; ctx.shadowBlur=0;
  ctx.fillText(score, 14, 32);

  // Vies (mini-vaisseaux)
  for(let i=0;i<lives;i++){
    ctx.save();
    ctx.translate(W-44-i*28, 26); ctx.rotate(-Math.PI/2);
    ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.5;
    ctx.shadowBlur=5; ctx.shadowColor='#ffffff';
    ctx.beginPath();
    ctx.moveTo(11,0); ctx.lineTo(-7,-6); ctx.lineTo(-4,0); ctx.lineTo(-7,6);
    ctx.closePath(); ctx.stroke();
    ctx.restore();
  }
  ctx.shadowBlur=0;

  // Niveau
  ctx.textAlign='center'; ctx.font='13px "Courier New",monospace';
  ctx.fillStyle='rgba(255,255,255,.35)';
  ctx.fillText('NIVEAU '+level, W/2, 20);

  // ── Overlays ──
  ctx.textAlign='center';

  if(phase==='idle'){
    ctx.font='bold 40px "Courier New",monospace';
    ctx.shadowBlur=14; ctx.shadowColor='#39ff9e'; ctx.fillStyle='#39ff9e';
    ctx.fillText('ASTÉROÏDES', W/2, H/2-42);
    ctx.shadowBlur=0;
    ctx.font='14px "Courier New",monospace'; ctx.fillStyle='rgba(255,255,255,.65)';
    ctx.fillText('← → rotation  ·  ↑  propulsion  ·  espace  tir', W/2, H/2+6);
    ctx.fillText('ZQSD ou WASD également supportés', W/2, H/2+26);
    const p=.55+.45*Math.sin(now/440);
    ctx.globalAlpha=p; ctx.fillStyle='#39ff9e';
    ctx.font='bold 17px "Courier New",monospace';
    ctx.fillText('APPUIE POUR COMMENCER', W/2, H/2+62);
    ctx.globalAlpha=1;
    if(best>0){
      ctx.font='15px "Courier New",monospace'; ctx.fillStyle='rgba(255,255,255,.38)';
      ctx.fillText('Record : '+best, W/2, H/2+96);
    }
  }

  if(phase==='next'){
    ctx.font='bold 38px "Courier New",monospace';
    ctx.shadowBlur=12; ctx.shadowColor='#39ff9e'; ctx.fillStyle='#39ff9e';
    ctx.fillText('NIVEAU '+level, W/2, H/2);
    ctx.shadowBlur=0;
    ctx.font='16px "Courier New",monospace'; ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.fillText('Score : '+score, W/2, H/2+34);
  }

  if(phase==='dead'){
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(0,0,W,H);
    ctx.font='bold 46px "Courier New",monospace';
    ctx.shadowBlur=14; ctx.shadowColor='#ff3b3b'; ctx.fillStyle='#ff3b3b';
    ctx.fillText('GAME OVER', W/2, H/2-50);
    ctx.shadowBlur=0;
    ctx.font='26px "Courier New",monospace'; ctx.fillStyle='#fff';
    ctx.fillText('Score : '+score, W/2, H/2-2);
    const newBest=score>=best&&score>0;
    ctx.font=(newBest?'bold ':'')+'18px "Courier New",monospace';
    ctx.fillStyle=newBest?'#FFD700':'rgba(255,255,255,.45)';
    ctx.shadowBlur=newBest?8:0; ctx.shadowColor='rgba(255,200,0,.5)';
    ctx.fillText(newBest?'🏆 Nouveau record !':'Record : '+best, W/2, H/2+36);
    ctx.shadowBlur=0;
    const p=.5+.5*Math.sin(now/380);
    ctx.globalAlpha=p; ctx.font='bold 17px "Courier New",monospace'; ctx.fillStyle='#fff';
    ctx.fillText('APPUIE POUR REJOUER', W/2, H/2+78);
    ctx.globalAlpha=1;
  }
}

// ── Boucle principale ──────────────────────────────────────
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1000,.05); lastT=now;
  update(dt); draw(now);
}

// ── Action démarrage / redémarrage ─────────────────────────
function action(){
  if(phase==='idle'){ startLevel(); }
  else if(phase==='dead'){ init(); startLevel(); }
}

// ── Clavier ───────────────────────────────────────────────
addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['Space',' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)||e.code==='Space')
    e.preventDefault();
  if(phase==='idle'||phase==='dead') action();
  else if(e.key===' '||e.code==='Space') fire();
});
addEventListener('keyup',e=>{ delete keys[e.key]; });

// ── Boutons mobiles ────────────────────────────────────────
function hold(id,key,fn){
  const el=document.getElementById(id); if(!el) return;
  const on=()=>{keys[key]=true; el.classList.add('on'); if(fn)fn();};
  const off=()=>{delete keys[key]; el.classList.remove('on');};
  el.addEventListener('pointerdown',e=>{e.preventDefault();on()});
  el.addEventListener('pointerup',off);
  el.addEventListener('pointerleave',off);
  el.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
  el.addEventListener('touchend',off);
}
hold('btnL','_L'); hold('btnR','_R'); hold('btnT','_T');
hold('btnF','_F',()=>{ if(phase==='idle'||phase==='dead') action(); else fire(); });

// Tap sur le canvas
cv.addEventListener('pointerdown',()=>{ if(phase==='idle'||phase==='dead') action(); });

// ── Démarrage ──────────────────────────────────────────────
init(); lastT=performance.now(); requestAnimationFrame(loop);
</script>
</body>
</html>
