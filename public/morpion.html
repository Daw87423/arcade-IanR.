<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morpion</title>
<script>if(!localStorage.getItem('arcade_token'))location.replace('index.html');</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#101418; --panel:#19222b; --line:rgba(255,255,255,.1);
  --x:#ff5d73; --o:#48cae4; --ink:#eef4f8; --mute:#8298a8; --gold:#ffd166;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Inter',sans-serif;background:radial-gradient(120% 90% at 50% -10%, #1c2730, var(--bg) 60%);
  color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;
}
.wrap{width:100%;max-width:420px;text-align:center}
.eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--mute);font-weight:600}
h1{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(38px,11vw,60px);line-height:1;margin:4px 0 18px}
.modes{display:grid;gap:11px}
.mode{cursor:pointer;font-family:inherit;font-weight:600;font-size:16px;color:var(--ink);
  background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;
  transition:transform .12s ease,border-color .14s ease}
.mode:hover{border-color:var(--o);transform:translateY(-2px)}
.mode small{display:block;color:var(--mute);font-weight:400;font-size:12.5px;margin-top:3px}
.status{font-family:'Fraunces',serif;font-size:22px;font-weight:600;min-height:30px;margin-bottom:14px}
.status .x{color:var(--x)} .status .o{color:var(--o)}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;aspect-ratio:1;margin-bottom:18px}
.sq{background:var(--panel);border:1px solid var(--line);border-radius:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;
  font-size:clamp(40px,15vw,72px);transition:background .15s ease,transform .08s ease}
.sq:hover:not(.taken){background:#202b35} .sq:active:not(.taken){transform:scale(.97)}
.sq.x{color:var(--x)} .sq.o{color:var(--o)}
.sq.win{background:rgba(255,209,102,.16);border-color:var(--gold)}
.sq .mark{animation:pop .16s ease}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.score{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.sc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 0;flex:1}
.sc .lab{font-size:11px;color:var(--mute);letter-spacing:.1em}
.sc .val{font-size:24px;font-weight:700;font-family:'Fraunces',serif}
.sc.x .val{color:var(--x)} .sc.o .val{color:var(--o)}
.row{display:flex;gap:10px}
.btn{cursor:pointer;font-family:inherit;font-weight:600;font-size:15px;flex:1;
  border:none;border-radius:12px;padding:13px;transition:transform .1s ease,filter .15s ease}
.btn.primary{background:var(--gold);color:#3a2c00}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}
.btn:active{transform:scale(.98)}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>
<a href="index.html" aria-label="Retour au menu" style="position:fixed;top:12px;left:12px;z-index:99;font-family:system-ui,-apple-system,'Space Grotesk',sans-serif;font-size:13px;font-weight:700;text-decoration:none;color:#e8f0ff;background:rgba(20,22,30,.66);border:1px solid rgba(255,255,255,.18);padding:7px 13px;border-radius:10px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);box-shadow:0 4px 16px rgba(0,0,0,.35)">← Menu</a>
<div class="wrap" id="app"></div>
<script>
const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let board, current, mode, locked, scores={X:0,O:0,N:0};
const app=document.getElementById('app');

menu();

function menu(){
  app.innerHTML=
    '<div class="eyebrow">Tic-tac-toe</div><h1>Morpion</h1>'+
    '<div class="modes">'+
      '<button class="mode" data-m="2p">À deux <small>Chacun son tour sur le même écran</small></button>'+
      '<button class="mode" data-m="easy">Contre l\'ordi · facile <small>Il joue au hasard, idéal pour débuter</small></button>'+
      '<button class="mode" data-m="normal">Contre l\'ordi · normal <small>Il sait gagner et se défendre, mais reste battable</small></button>'+
      '<button class="mode" data-m="hard">Contre l\'ordi · imbattable <small>Impossible à battre — vise le match nul</small></button>'+
    '</div>';
  app.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.m;scores={X:0,O:0,N:0};game();});
}

function game(){
  board=Array(9).fill(''); current='X'; locked=false;
  app.innerHTML=
    '<div class="eyebrow">'+modeLabel()+'</div>'+
    '<div class="status" id="status"></div>'+
    '<div class="board" id="board"></div>'+
    '<div class="score">'+
      '<div class="sc x"><div class="lab">'+(mode==='2p'?'Joueur X':'Toi (X)')+'</div><div class="val" id="sX">0</div></div>'+
      '<div class="sc"><div class="lab">Nuls</div><div class="val" id="sN">0</div></div>'+
      '<div class="sc o"><div class="lab">'+(mode==='2p'?'Joueur O':'Ordi (O)')+'</div><div class="val" id="sO">0</div></div>'+
    '</div>'+
    '<div class="row"><button class="btn primary" id="restart">Manche suivante</button>'+
    '<button class="btn ghost" id="menu">Menu</button></div>';
  document.getElementById('board').innerHTML=board.map((_,i)=>'<button class="sq" data-i="'+i+'"></button>').join('');
  app.querySelectorAll('.sq').forEach(s=>s.onclick=()=>play(+s.dataset.i));
  document.getElementById('restart').onclick=game;
  document.getElementById('menu').onclick=menu;
  updateScores(); setStatus();
}
function modeLabel(){return mode==='2p'?'À deux':mode==='easy'?'Ordi · facile':mode==='normal'?'Ordi · normal':'Ordi · imbattable';}
function setStatus(){
  const s=document.getElementById('status');
  if(mode==='2p') s.innerHTML='Au tour de <span class="'+current.toLowerCase()+'">'+current+'</span>';
  else s.innerHTML=current==='X'?'À toi de jouer <span class="x">X</span>':'L\'ordi réfléchit…';
}
function play(i){
  if(locked||board[i])return;
  if(mode!=='2p'&&current==='O')return;
  move(i);
  if(!locked&&mode!=='2p'&&current==='O') setTimeout(aiMove,420);
}
function move(i){
  board[i]=current;
  const sq=app.querySelector('[data-i="'+i+'"]');
  sq.innerHTML='<span class="mark">'+current+'</span>';
  sq.classList.add('taken',current.toLowerCase());
  const win=winner(board);
  if(win){ endRound(win); return; }
  if(board.every(Boolean)){ endRound('N'); return; }
  current=current==='X'?'O':'X'; setStatus();
}
function aiMove(){
  if(locked)return;
  let i;
  if(mode==='easy'){ const e=board.map((v,k)=>v?null:k).filter(v=>v!==null); i=e[Math.random()*e.length|0]; }
  else if(mode==='normal'){ i=normalMove(); }
  else i=bestMove();
  move(i);
}
function findWinning(p){
  for(const[a,c,d]of WINS){
    const line=[board[a],board[c],board[d]];
    if(line.filter(v=>v===p).length===2&&line.includes('')) return [a,c,d][line.indexOf('')];
  }
  return null;
}
function normalMove(){
  let m=findWinning('O'); if(m!=null)return m;      // saisir la victoire
  m=findWinning('X'); if(m!=null)return m;           // bloquer l'adversaire
  const e=board.map((v,k)=>v?null:k).filter(v=>v!==null);
  return e[Math.random()*e.length|0];                // sinon, au hasard
}
function bestMove(){
  let bestScore=-Infinity, m;
  for(let i=0;i<9;i++) if(!board[i]){
    board[i]='O'; const sc=minimax(board,0,false); board[i]='';
    if(sc>bestScore){bestScore=sc;m=i;}
  }
  return m;
}
function minimax(b,depth,isMax){
  const w=winner(b);
  if(w==='O')return 10-depth; if(w==='X')return depth-10; if(b.every(Boolean))return 0;
  if(isMax){let best=-Infinity;for(let i=0;i<9;i++)if(!b[i]){b[i]='O';best=Math.max(best,minimax(b,depth+1,false));b[i]='';}return best;}
  else{let best=Infinity;for(let i=0;i<9;i++)if(!b[i]){b[i]='X';best=Math.min(best,minimax(b,depth+1,true));b[i]='';}return best;}
}
function winner(b){
  for(const[a,c,d]of WINS) if(b[a]&&b[a]===b[c]&&b[a]===b[d]) return b[a];
  return null;
}
function endRound(res){
  locked=true;
  const s=document.getElementById('status');
  if(res==='N'){ scores.N++; s.textContent='Match nul 🤝'; }
  else{
    scores[res]++;
    const line=WINS.find(([a,c,d])=>board[a]===res&&board[c]===res&&board[d]===res);
    if(line)line.forEach(i=>app.querySelector('[data-i="'+i+'"]').classList.add('win'));
    if(mode==='2p') s.innerHTML='<span class="'+res.toLowerCase()+'">'+res+'</span> gagne !';
    else s.innerHTML=res==='X'?'Tu gagnes ! 🎉':'L\'ordi gagne 🤖';
  }
  updateScores();
}
function updateScores(){
  document.getElementById('sX').textContent=scores.X;
  document.getElementById('sO').textContent=scores.O;
  document.getElementById('sN').textContent=scores.N;
}
</script>
</body>
</html>
