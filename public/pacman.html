<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>if(!localStorage.getItem('arcade_token'))location.replace('index.html');</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pac-Man</title>
<meta name="theme-color" content="#08080f">
<meta name="color-scheme" content="dark">
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root{--bg:#08080f;--panel:#11111d;--line:rgba(255,255,255,.1);--ink:#f0f2ff;--mute:#8189a8;--pac:#ffe23d;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',sans-serif;background:radial-gradient(125% 90% at 50% -10%,#101030,var(--bg) 55%);
  color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:480px;text-align:center}
.head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.title{font-family:'Anton',sans-serif;font-size:34px;letter-spacing:.04em;text-transform:uppercase;
  background:linear-gradient(95deg,var(--pac),#ff8a3d);-webkit-background-clip:text;background-clip:text;color:transparent}
.scores{display:flex;gap:14px;font-family:'Space Mono',monospace}
.sc{text-align:right}.sc .lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}
.sc .val{font-size:20px;font-weight:700;color:var(--pac)}
.sizes{display:flex;gap:7px;justify-content:center;margin-bottom:14px}
.sizes button{cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);
  background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:8px 14px;transition:.15s}
.sizes button.on{border-color:var(--pac);background:rgba(255,226,61,.14);color:var(--pac)}
.board-wrap{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#05050c;display:inline-block;width:100%}
canvas{display:block;width:100%;height:auto;touch-action:none}
.lives{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:12px;min-height:20px}
.lives i{width:14px;height:14px;border-radius:50%;background:var(--pac);display:inline-block}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,8,15,.88);backdrop-filter:blur(3px);gap:8px;padding:20px;text-align:center}
.overlay.hide{display:none}
.ov-t{font-family:'Anton',sans-serif;font-size:30px;text-transform:uppercase}
.ov-s{color:var(--mute);font-size:14px;max-width:320px}
.btn{cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;margin-top:6px;
  background:var(--pac);color:#2a1f00;border:none;border-radius:12px;padding:12px 28px;box-shadow:0 0 22px rgba(255,226,61,.35)}
.btn:active{transform:scale(.97)}
.hint{color:var(--mute);font-size:12px;margin-top:14px;font-family:'Space Mono',monospace;line-height:1.7}
.back{position:fixed;top:12px;left:12px;z-index:99;font-size:13px;font-weight:700;text-decoration:none;color:#e8f0ff;
  background:rgba(20,22,30,.66);border:1px solid rgba(255,255,255,.18);padding:7px 13px;border-radius:10px;backdrop-filter:blur(6px)}
:focus-visible{outline:3px solid var(--pac);outline-offset:2px}
</style>
</head>
<body>
<a href="index.html" class="back" aria-label="Retour au menu">← Menu</a>
<div class="wrap">
  <div class="head">
    <div class="title">Pac-Man</div>
    <div class="scores">
      <div class="sc"><div class="lab">Score</div><div class="val" id="score">0</div></div>
      <div class="sc"><div class="lab">Record</div><div class="val" id="best">—</div></div>
    </div>
  </div>
  <div class="sizes" id="sizes">
    <button data-s="small">Petit</button>
    <button data-s="medium" class="on">Moyen</button>
    <button data-s="large">Grand</button>
  </div>
  <div class="board-wrap">
    <canvas id="cv"></canvas>
    <div class="overlay" id="ov">
      <div class="ov-t" id="ovT">Pac-Man</div>
      <div class="ov-s" id="ovS">Mange toutes les pastilles en évitant les fantômes. Les grosses pastilles les rendent vulnérables !</div>
      <button class="btn" id="play">Jouer ▶</button>
    </div>
  </div>
  <div class="lives" id="lives"></div>
  <div class="hint">Flèches / ZQSD · glisse du doigt sur mobile<br>Petit : pas de tunnel · Moyen : 1 tunnel · Grand : 2 tunnels</div>
</div>

<script src="auth.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════════
   Pac-Man — mécanique Namco fidèle
   • Blinky / Pinky / Inky / Clyde avec ciblage authentique
   • scatter / chase / frightened / yeux
   • Quirk Pinky UP (décalage Namco original)
   • 3 labyrinthes validés (flood-fill) ; record séparé par terrain
   ═══════════════════════════════════════════════════════════════════════ */

// ── labyrinthes ────────────────────────────────────────────────────────
const MAZES = {
  small: [                          // 13 cols × 15 rows  – pas de tunnel
    "#############",
    "#o...#...#.o#",
    "#.###.#.###.#",
    "#...........#",
    "#.#.#...#.#.#",   // exitCell (6,4)='.'
    "#.#.##-##.#.#",   // porte (6,5)
    "#.#.#HHH#.#.#",   // H : (5,6)(6,6)(7,6)
    "#.#.#####.#.#",
    "#.#.#...#.#.#",
    "#...........#",
    "###.#...#.###",
    "#...........#",
    "#.##.#.#.##.#",
    "#o... .....o#",   // espace → pac (5,13)
    "#############",
  ],
  medium: [                         // 19 cols × 21 rows  – 1 tunnel (row 10)
    "###################",
    "#o...........#...o#",
    "#.##.#.#####.#.##.#",
    "#.................#",
    "#.###.##...##.###.#",
    "#.................#",
    "#.#.#.#.#.#.#.#.#.#",
    "#.#.#.#.....#.#.#.#",   // exitCell (9,7)='.'
    "#......##-##......#",    // porte (9,8)
    "#......#HHH#......#",    // H : (8,9)(9,9)(10,9)
    "...#...#####...#...",    // TUNNEL + plancher
    "#.#.#.#.....#.#.#.#",
    "#.#.#.#.#.#.#.#.#.#",
    "#.................#",
    "#.###.##...##.###.#",
    "#.................#",
    "#.##.#.#####.#.##.#",
    "#o...........#...o#",
    "#.................#",
    "#........ ........#",   // espace → pac (9,19)
    "###################",
  ],
  large: [                          // 25 cols × 23 rows  – 2 tunnels (rows 6 & 16)
    "#########################",
    "#o..........#..........o#",
    "#.########.#.########.#.#",
    "#.#......#.#.#......#.#.#",
    "#.#.####.#.#.#.####.#.#.#",
    "#.#.#....#...#....#.#.#.#",
    "....#.#.###.#.###.#.#....",   // TUNNEL 1
    "#.#.#.#.#.......#.#.#.#.#",
    "#.#.#...#.#.#.#.#...#.#.#",
    "#.#.#...#.....#...#.#.#.#",   // exitCell (10,9)='.'
    "#.#.###.##-##.###.#.#.#.#",   // porte (10,10)
    "#.#.###.#HHH#.###.#.#.#.#",   // H : (9,11)(10,11)(11,11)
    "#.#.###.#####.###.#.#.#.#",   // plancher
    "#.#.#.#.#.......#.#.#.#.#",
    "#.#.#...#.#.#.#.#...#.#.#",
    "#.#.#.#.#.......#.#.#.#.#",
    "....#.#.###.#.###.#.#....",   // TUNNEL 2
    "#.#.#.#.#.......#.#.#.#.#",
    "#.#.####.#.#.#.#.####.#.#",
    "#.#......#.#.#......#.#.#",
    "#.########.###.########.#",
    "#o.......... ..........o#",   // espace → pac (12,21)
    "#########################",
  ],
};

const TILE_SZ = { small:26, medium:21, large:16 };

// ── constantes ─────────────────────────────────────────────────────────
const GHOST_DEFS = [
  { name:'blinky', color:'#ff3b3b' },
  { name:'pinky',  color:'#ff9bd2' },
  { name:'inky',   color:'#4dd0ff' },
  { name:'clyde',  color:'#ffb14e' },
];
const DIRS  = { u:[0,-1], d:[0,1], l:[-1,0], r:[1,0] };
const OPP   = { u:'d', d:'u', l:'r', r:'l' };
const ORDER = ['u','l','d','r'];   // priorité de direction (original Namco)

// vitesses cases/seconde
const SPD = { pac:7.5, ghost:6.5, fright:4.5, eyes:14, tunnel:3.8 };

// phases scatter/chase (secondes)
const PHASES = [
  ['scatter',7],['chase',20],['scatter',7],['chase',20],
  ['scatter',5],['chase',20],['scatter',5],['chase',1e9],
];
const FRIGHT_TIME = 7;   // secondes mode effrayé

// ── état ───────────────────────────────────────────────────────────────
let SIZE='medium';
let COLS, ROWS, TILE, grid, dotsLeft, score, best=0, lives;
let pac, ghosts, exitCell, doorCell, houseCells;
let running=false, dead=false, levelClearing=false;
let modeIdx, modeTimer, frightTimer, eatChain;
let raf=null, lastT=0;

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl  = document.getElementById('best');
const livesEl = document.getElementById('lives');
const ov   = document.getElementById('ov');
const ovT  = document.getElementById('ovT');
const ovS  = document.getElementById('ovS');

// ── records par terrain ────────────────────────────────────────────────
function bestKey(){ return 'pacman_'+SIZE; }
function loadBest(){
  bestEl.textContent='—'; best=0;
  Arcade.loadBest(bestKey()).then(b=>{ best=b||0; bestEl.textContent=best||'—'; });
}

// ── analyse du labyrinthe ──────────────────────────────────────────────
function parseMaze(size){
  SIZE=size; TILE=TILE_SZ[size];
  const src=MAZES[size];
  ROWS=src.length; COLS=src[0].length;
  grid=src.map(r=>r.split(''));
  cv.width=COLS*TILE; cv.height=ROWS*TILE;
  doorCell=null; houseCells=[]; let start=null; dotsLeft=0;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const ch=grid[r][c];
    if(ch==='-') doorCell={c,r};
    else if(ch==='H') houseCells.push({c,r});
    else if(ch===' '&&!start) start={c,r};
    if(ch==='.'||ch==='o') dotsLeft++;
  }
  if(!start) start={c:(COLS>>1), r:ROWS-2};
  exitCell={ c:doorCell.c, r:doorCell.r-1 };
  pac={ start };
}

function isWall(c,r){ return !grid[r]||grid[r][c]==='#'; }
function wrapC(c){ return (c%COLS+COLS)%COLS; }
function tileChar(c,r){ const row=grid[r]; return row?row[c]:'#'; }

// franchissabilité pour les fantômes
function ghostCan(c,r,mode){
  if(r<0||r>=ROWS) return false;
  const ch=tileChar(c,r);
  if(ch==='#') return false;
  if(ch==='-') return mode==='leave'||mode==='eyes'||mode==='enter';
  if(ch==='H') return mode==='home'||mode==='leave'||mode==='eyes'||mode==='enter';
  return true;
}
function pacCan(c,r){
  const ch=tileChar(wrapC(c),r); return ch!=='#'&&ch!=='-'&&ch!=='H';
}

// ── spawn des acteurs ──────────────────────────────────────────────────
function spawnActors(){
  pac={ c:pac.start.c, r:pac.start.r, dir:'l', want:'l', t:0, moving:false, start:pac.start };
  const center = houseCells.find(h=>h.c===doorCell.c)||houseCells[(houseCells.length/2)|0];
  const others = houseCells.filter(h=>h!==center);
  const spots  = [ exitCell, center, others[0]||center, others[1]||center ];
  ghosts = GHOST_DEFS.map((d,i)=>({
    name:d.name, color:d.color,
    c:spots[i].c, r:spots[i].r, dir: i===0?'l':'u', t:0,
    mode: i===0?'normal':'home',
    releaseAt: i===0?0:(i*2.5),
    homeTimer:0,
  }));
  modeIdx=0; modeTimer=PHASES[0][1]; frightTimer=0; eatChain=0;
}

// ── ciblage Namco ──────────────────────────────────────────────────────
function scatterTarget(name){
  switch(name){
    case 'blinky': return {c:COLS-2, r:-2};
    case 'pinky':  return {c:2,      r:-2};
    case 'inky':   return {c:COLS-1, r:ROWS+1};
    default:       return {c:0,      r:ROWS+1}; // clyde
  }
}

function aheadOf(n){
  const d=DIRS[pac.dir]||[0,0];
  return {c:pac.c+d[0]*n, r:pac.r+d[1]*n};
}

function chaseTarget(g){
  const blinky=ghosts[0];
  switch(g.name){
    case 'blinky': return {c:pac.c, r:pac.r};
    case 'pinky': {
      // Quirk Namco original : face UP → décalage 4 gauche aussi
      const d=DIRS[pac.dir]||[0,0];
      let tc=pac.c+d[0]*4, tr=pac.r+d[1]*4;
      if(pac.dir==='u') tc-=4;
      return {c:tc, r:tr};
    }
    case 'inky': {
      const p=aheadOf(2);
      return {c:p.c*2-blinky.c, r:p.r*2-blinky.r};
    }
    default: { // clyde
      const dist=Math.hypot(g.c-pac.c, g.r-pac.r);
      return dist>8 ? {c:pac.c,r:pac.r} : scatterTarget('clyde');
    }
  }
}

function ghostTarget(g){
  if(g.mode==='eyes')  return exitCell;
  if(g.mode==='enter') return houseCells.find(h=>h.c===doorCell.c)||houseCells[0];
  if(g.mode==='leave') return exitCell;
  if(frightTimer>0&&g.mode==='normal') return null;
  return PHASES[modeIdx][0]==='scatter' ? scatterTarget(g.name) : chaseTarget(g);
}

// ── décision de direction (à chaque franchissement de case) ───────────
function ghostNavMode(g){
  if(g.mode==='eyes'||g.mode==='enter'||g.mode==='leave') return g.mode;
  return 'normal';
}
function chooseGhostDir(g){
  const nm=ghostNavMode(g);
  let cands=[];
  for(const k of ORDER){
    if(k===OPP[g.dir]) continue;   // pas de demi-tour sauf si obligé
    const d=DIRS[k]; const nc=wrapC(g.c+d[0]), nr=g.r+d[1];
    if(ghostCan(nc,nr,nm)) cands.push(k);
  }
  if(!cands.length){
    const k=OPP[g.dir]; const d=DIRS[k];
    if(ghostCan(wrapC(g.c+d[0]),g.r+d[1],nm)) return k;
    return g.dir;
  }
  if(frightTimer>0&&g.mode==='normal') return cands[(Math.random()*cands.length)|0];
  const tgt=ghostTarget(g);
  if(!tgt) return cands[(Math.random()*cands.length)|0];
  let bestK=cands[0], bestD=Infinity;
  for(const k of cands){
    const d=DIRS[k]; const nc=g.c+d[0], nr=g.r+d[1];
    const dist=(nc-tgt.c)**2+(nr-tgt.r)**2;
    if(dist<bestD){bestD=dist;bestK=k;}
  }
  return bestK;
}

// ── déplacement (interpolation sub-tile) ──────────────────────────────
function nextTile(c,r,dir){ const d=DIRS[dir]; return {c:wrapC(c+d[0]),r:r+d[1]}; }

function stepPac(dt){
  // demi-tour instantané si le joueur veut rebrousser chemin
  if(pac.want===OPP[pac.dir]&&pac.moving){ pac.dir=pac.want; pac.t=1-pac.t; }
  if(!pac.moving){
    const w=nextTile(pac.c,pac.r,pac.want);
    if(pacCan(w.c,w.r)){ pac.dir=pac.want; pac.moving=true; }
    else{ const f=nextTile(pac.c,pac.r,pac.dir); if(pacCan(f.c,f.r)) pac.moving=true; else return; }
  }
  pac.t+=SPD.pac*dt;
  while(pac.t>=1){
    pac.t-=1;
    const n=nextTile(pac.c,pac.r,pac.dir);
    pac.c=n.c; pac.r=n.r;
    eatAt(pac.c,pac.r);
    const w=nextTile(pac.c,pac.r,pac.want);
    if(pacCan(w.c,w.r)) pac.dir=pac.want;
    const f=nextTile(pac.c,pac.r,pac.dir);
    if(!pacCan(f.c,f.r)){ pac.moving=false; pac.t=0; break; }
  }
}

function stepGhost(g,dt){
  if(g.mode==='home'){
    g.homeTimer+=dt;
    if(g.homeTimer>=g.releaseAt) g.mode='leave';
    return;
  }
  let spd=SPD.ghost;
  if(g.mode==='eyes') spd=SPD.eyes;
  else if(frightTimer>0&&g.mode==='normal') spd=SPD.fright;
  // ralenti dans le tunnel
  if(g.c<=2||g.c>=COLS-3) spd=Math.min(spd,SPD.tunnel);

  g.t+=spd*dt;
  while(g.t>=1){
    g.t-=1;
    const n=nextTile(g.c,g.r,g.dir);
    g.c=n.c; g.r=n.r;
    // transitions maison
    if(g.mode==='leave'&&g.c===exitCell.c&&g.r===exitCell.r){
      g.mode='normal'; g.dir='l'; g.t=0; return;
    }
    if(g.mode==='eyes'&&g.c===exitCell.c&&g.r===exitCell.r){
      g.mode='enter';
    }
    if(g.mode==='enter'){
      const hc=houseCells.find(h=>h.c===doorCell.c)||houseCells[0];
      if(g.c===hc.c&&g.r===hc.r){ g.mode='home'; g.homeTimer=0; g.releaseAt=1.5; g.dir='u'; g.t=0; return; }
    }
    g.dir=chooseGhostDir(g);
  }
}

// ── pastilles, modes, collisions ───────────────────────────────────────
function eatAt(c,r){
  const ch=grid[r][c];
  if(ch==='.'){ grid[r][c]=' '; score+=10; dotsLeft--; }
  else if(ch==='o'){ grid[r][c]=' '; score+=50; dotsLeft--; startFright(); }
  if(score>best){ best=score; bestEl.textContent=best; }
  scoreEl.textContent=score;
  if(dotsLeft<=0) levelClear();
}

function startFright(){
  frightTimer=FRIGHT_TIME; eatChain=0;
  for(const g of ghosts){ if(g.mode==='normal') g.dir=OPP[g.dir]; }
}

function updateModes(dt){
  if(frightTimer>0){ frightTimer=Math.max(0,frightTimer-dt); return; }
  if(PHASES[modeIdx][1]>=1e9) return;
  modeTimer-=dt;
  if(modeTimer<=0&&modeIdx<PHASES.length-1){
    modeIdx++; modeTimer=PHASES[modeIdx][1];
    for(const g of ghosts){ if(g.mode==='normal') g.dir=OPP[g.dir]; }
  }
}

function collisions(){
  for(const g of ghosts){
    const gx=g.c+(DIRS[g.dir]?DIRS[g.dir][0]*g.t:0);
    const gy=g.r+(DIRS[g.dir]?DIRS[g.dir][1]*g.t:0);
    const px_=pac.c+(DIRS[pac.dir]?DIRS[pac.dir][0]*pac.t:0);
    const py_=pac.r+(DIRS[pac.dir]?DIRS[pac.dir][1]*pac.t:0);
    if(Math.hypot(gx-px_,gy-py_)<0.55){
      if(g.mode==='eyes'||g.mode==='enter') continue;
      if(frightTimer>0&&g.mode==='normal'){
        eatChain=Math.min(eatChain+1,4);
        score+=100*Math.pow(2,eatChain);   // 200,400,800,1600
        scoreEl.textContent=score;
        if(score>best){ best=score; bestEl.textContent=best; }
        g.mode='eyes';
      } else if(g.mode==='normal'||g.mode==='leave'){
        loseLife(); return;
      }
    }
  }
}

function loseLife(){
  lives--; renderLives();
  if(lives<=0){ gameOver(); return; }
  running=false; drawFrame();
  setTimeout(()=>{ const g=grid; spawnActors(); grid=g; running=true; lastT=performance.now(); raf=requestAnimationFrame(loop); }, 900);
}

function levelClear(){
  levelClearing=true; running=false;
  setTimeout(()=>{ parseMaze(SIZE); spawnActors(); levelClearing=false; running=true; lastT=performance.now(); raf=requestAnimationFrame(loop); }, 700);
}

function gameOver(){
  running=false; dead=true;
  if(raf) cancelAnimationFrame(raf);
  Arcade.saveBest(bestKey(),score);
  ovT.textContent='Partie terminée';
  ovS.innerHTML='Score&nbsp;: <b>'+score+'</b><br>Record ('+(SIZE==='small'?'petit':SIZE==='large'?'grand':'moyen')+')&nbsp;: <b>'+Math.max(best,score)+'</b>';
  document.getElementById('play').textContent='Rejouer ▶';
  ov.classList.remove('hide');
}

// ── boucle principale ──────────────────────────────────────────────────
function loop(now){
  if(!running) return;
  let dt=(now-lastT)/1000; lastT=now;
  if(dt>0.05) dt=0.05;
  updateModes(dt);
  stepPac(dt);
  for(const g of ghosts) stepGhost(g,dt);
  collisions();
  drawFrame();
  if(running) raf=requestAnimationFrame(loop);
}

// ── rendu ──────────────────────────────────────────────────────────────
function px(c){ return c*TILE; }

function actorXY(a){
  const d=DIRS[a.dir]||[0,0];
  const x=((a.c+d[0]*a.t)%COLS+COLS)%COLS;
  const y=a.r+d[1]*a.t;
  return {x:x*TILE+TILE/2, y:y*TILE+TILE/2};
}

function drawFrame(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#05050c'; ctx.fillRect(0,0,cv.width,cv.height);

  // labyrinthes
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const ch=grid[r][c];
    if(ch==='#'){
      ctx.fillStyle='#1622a8';
      roundRect(px(c)+1,px(r)+1,TILE-2,TILE-2,Math.max(2,TILE*.20)); ctx.fill();
      ctx.fillStyle='#2b3df0';
      roundRect(px(c)+2.5,px(r)+2.5,TILE-5,TILE-5,Math.max(1.5,TILE*.13)); ctx.fill();
    } else if(ch==='-'){
      ctx.fillStyle='#ff9bd2';
      ctx.fillRect(px(c)+2,px(r)+TILE*.42,TILE-4,TILE*.14);
    } else if(ch==='.'){
      ctx.fillStyle='#ffd9a8';
      ctx.beginPath(); ctx.arc(px(c)+TILE/2,px(r)+TILE/2,Math.max(1.5,TILE*.08),0,7); ctx.fill();
    } else if(ch==='o'){
      ctx.fillStyle='#ffd9a8';
      ctx.beginPath(); ctx.arc(px(c)+TILE/2,px(r)+TILE/2,Math.max(3,TILE*.26),0,7); ctx.fill();
    }
  }

  drawGhosts();
  drawPac();
}

function drawPac(){
  const {x,y}=actorXY(pac);
  const R=TILE*.46;
  const open=pac.moving?(Math.abs(Math.sin(performance.now()/90))*.30):.12;
  const a0=open*Math.PI, a1=(2-open)*Math.PI;
  let rot=0;
  if(pac.dir==='l') rot=Math.PI; else if(pac.dir==='u') rot=-Math.PI/2; else if(pac.dir==='d') rot=Math.PI/2;
  ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
  ctx.fillStyle='#ffe23d';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0,R,a0,a1); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawGhosts(){
  for(const g of ghosts){
    const {x,y}=actorXY(g);
    const R=TILE*.46;
    const eyesOnly=(g.mode==='eyes'||g.mode==='enter');
    let body=g.color;
    if(!eyesOnly&&frightTimer>0&&g.mode==='normal'){
      body=(frightTimer<2&&(Math.floor(performance.now()/200)%2===0))?'#ffffff':'#2b3df0';
    }
    if(!eyesOnly){
      ctx.fillStyle=body;
      ctx.beginPath();
      ctx.arc(x,y-R*.05,R,Math.PI,0);
      ctx.lineTo(x+R,y+R*.72);
      const n=4;
      for(let i=0;i<n;i++){
        const bx=x+R-(2*R)*(i+.5)/n;
        const by=y+R*.72+((i%2===0)?-R*.18:R*.05);
        ctx.lineTo(bx,by);
      }
      ctx.lineTo(x-R,y+R*.72); ctx.closePath(); ctx.fill();
    }
    // yeux
    const dd=DIRS[g.dir]||[0,0];
    const ex=dd[0]*R*.18, ey=dd[1]*R*.18;
    for(const sx of [-1,1]){
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.ellipse(x+sx*R*.32,y-R*.12,R*.20,R*.26,0,0,7); ctx.fill();
      if(!(frightTimer>0&&g.mode==='normal'&&!eyesOnly)){
        ctx.fillStyle='#1b2bd0';
        ctx.beginPath(); ctx.arc(x+sx*R*.32+ex,y-R*.12+ey,R*.10,0,7); ctx.fill();
      }
    }
    if(frightTimer>0&&g.mode==='normal'&&!eyesOnly){
      ctx.fillStyle=body==='#ffffff'?'#ff3b3b':'#ffd9a8';
      for(const sx of [-1,1]){ ctx.beginPath(); ctx.arc(x+sx*R*.30,y,R*.10,0,7); ctx.fill(); }
    }
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function renderLives(){
  livesEl.innerHTML='';
  for(let i=0;i<Math.max(0,lives);i++){ livesEl.appendChild(document.createElement('i')); }
}

// ── contrôles ──────────────────────────────────────────────────────────
const KEYMAP={ArrowUp:'u',ArrowDown:'d',ArrowLeft:'l',ArrowRight:'r',z:'u',Z:'u',s:'d',S:'d',q:'l',Q:'l',d:'r',D:'r',w:'u',W:'u'};
addEventListener('keydown',e=>{
  const k=KEYMAP[e.key];
  if(k){ if(pac) pac.want=k; if(e.key.startsWith('Arrow')) e.preventDefault(); }
});
let tsx=0,tsy=0;
cv.addEventListener('touchstart',e=>{ const t=e.touches[0]; tsx=t.clientX; tsy=t.clientY; },{passive:true});
cv.addEventListener('touchmove',e=>{
  if(!pac) return;
  const t=e.touches[0]; const dx=t.clientX-tsx, dy=t.clientY-tsy;
  if(Math.abs(dx)+Math.abs(dy)<16) return;
  pac.want=Math.abs(dx)>Math.abs(dy)?(dx>0?'r':'l'):(dy>0?'d':'u');
  tsx=t.clientX; tsy=t.clientY;
},{passive:true});

// ── démarrage / sélection de terrain ───────────────────────────────────
function startGame(){
  parseMaze(SIZE); spawnActors();
  score=0; lives=3; dead=false; levelClearing=false;
  scoreEl.textContent='0'; renderLives();
  ov.classList.add('hide');
  running=true; lastT=performance.now(); raf=requestAnimationFrame(loop);
}
document.getElementById('play').onclick=startGame;

document.getElementById('sizes').querySelectorAll('button').forEach(b=>{
  b.onclick=()=>{
    if(b.dataset.s===SIZE&&running) return;
    document.getElementById('sizes').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); SIZE=b.dataset.s;
    if(raf) cancelAnimationFrame(raf);
    running=false; dead=false;
    loadBest();
    parseMaze(SIZE); spawnActors(); drawFrame();
    ovT.textContent='Pac-Man';
    ovS.textContent='Terrain '+(SIZE==='small'?'petit':SIZE==='large'?'grand':'moyen')+'. Mange toutes les pastilles, évite les fantômes, croque-les après une grosse pastille !';
    document.getElementById('play').textContent='Jouer ▶';
    ov.classList.remove('hide');
  };
});

// ── init ───────────────────────────────────────────────────────────────
loadBest();
parseMaze(SIZE); spawnActors(); drawFrame();
lives=3; renderLives();
</script>
