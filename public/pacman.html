<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>if(!localStorage.getItem('arcade_token'))location.replace('index.html');</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pac-Man</title>
<meta name="theme-color" content="#08080f">
<meta name="color-scheme" content="dark">
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root{--bg:#08080f;--panel:#11111d;--line:rgba(255,255,255,.1);--ink:#f0f2ff;--mute:#8189a8;--pac:#ffe23d;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',sans-serif;background:radial-gradient(125% 90% at 50% -10%,#101030,var(--bg) 55%);
  color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:440px;text-align:center}
.head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.title{font-family:'Anton',sans-serif;font-size:34px;letter-spacing:.04em;text-transform:uppercase;
  background:linear-gradient(95deg,var(--pac),#ff8a3d);-webkit-background-clip:text;background-clip:text;color:transparent}
.scores{display:flex;gap:14px;font-family:'Space Mono',monospace}
.sc{text-align:right}.sc .lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}
.sc .val{font-size:20px;font-weight:700;color:var(--pac)}
.sizes{display:flex;gap:7px;justify-content:center;margin-bottom:14px}
.sizes button{cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);
  background:var(--panel);border:1.5px solid var(--line);border-radius:10px;padding:8px 14px;transition:.15s}
.sizes button.on{border-color:var(--pac);background:rgba(255,226,61,.14);color:var(--pac)}
.board-wrap{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#05050c;display:inline-block;width:100%}
canvas{display:block;width:100%;height:auto;touch-action:none}
.lives{display:flex;gap:6px;align-items:center;justify-content:center;margin-top:12px;min-height:20px}
.lives i{width:14px;height:14px;border-radius:50%;background:var(--pac);display:inline-block}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,8,15,.88);backdrop-filter:blur(3px);gap:8px;padding:20px;text-align:center}
.overlay.hide{display:none}
.ov-t{font-family:'Anton',sans-serif;font-size:30px;text-transform:uppercase}
.ov-s{color:var(--mute);font-size:14px;max-width:300px}
.btn{cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;margin-top:6px;
  background:var(--pac);color:#2a1f00;border:none;border-radius:12px;padding:12px 28px;box-shadow:0 0 22px rgba(255,226,61,.35)}
.btn:active{transform:scale(.97)}
.hint{color:var(--mute);font-size:12.5px;margin-top:14px;font-family:'Space Mono',monospace;line-height:1.6}
.back{position:fixed;top:12px;left:12px;z-index:99;font-size:13px;font-weight:700;text-decoration:none;color:#e8f0ff;
  background:rgba(20,22,30,.66);border:1px solid rgba(255,255,255,.18);padding:7px 13px;border-radius:10px;backdrop-filter:blur(6px)}
:focus-visible{outline:3px solid var(--pac);outline-offset:2px}
</style>
</head>
<body>
<a href="index.html" class="back" aria-label="Retour au menu">← Menu</a>
<div class="wrap">
  <div class="head">
    <div class="title">Pac-Man</div>
    <div class="scores">
      <div class="sc"><div class="lab">Score</div><div class="val" id="score">0</div></div>
      <div class="sc"><div class="lab">Record</div><div class="val" id="best">0</div></div>
    </div>
  </div>
  <div class="sizes" id="sizes">
    <button data-s="small">Petit</button>
    <button data-s="medium" class="on">Moyen</button>
    <button data-s="large">Grand</button>
  </div>
  <div class="board-wrap">
    <canvas id="cv" width="418" height="462"></canvas>
    <div class="overlay" id="ov">
      <div class="ov-t" id="ovT">Pac-Man</div>
      <div class="ov-s" id="ovS">Mange toutes les pastilles en évitant les fantômes. Les grosses pastilles les rendent vulnérables : croque-les pour des points bonus !</div>
      <button class="btn" id="play">Jouer ▶</button>
    </div>
  </div>
  <div class="lives" id="lives"></div>
  <div class="hint">Flèches du clavier · glisse du doigt sur mobile<br>Moyen et grand : un tunnel relie les deux bords</div>
</div>
<script src="auth.js"></script>
<script>
const SIZES = {
  small:  { cols:13, rows:13, tunnel:false, tile:26 },
  medium: { cols:19, rows:21, tunnel:true,  tile:22 },
  large:  { cols:25, rows:23, tunnel:true,  tile:18 },
};
let currentSize = 'medium';

let COLS, ROWS, TILE, grid, dotsLeft, score, best=0, lives, running=false, scared=0;
let pac, ghosts, PAC, GHOSTS, stepAcc=0, lastFrame=0, mouth=0;
const STEP = 150;
const GHOST_COLS = ['#ff4d6d','#ff9d4d','#48cae4','#c77dff'];

const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const scoreEl=document.getElementById('score'), bestEl=document.getElementById('best'),
      livesEl=document.getElementById('lives'),
      ov=document.getElementById('ov'), ovT=document.getElementById('ovT'), ovS=document.getElementById('ovS');

Arcade.loadBest('pacman').then(b=>{ if(b>best){ best=b; bestEl.textContent=b; } });

// ---- génération du labyrinthe (toujours connecté : piliers sur un quadrillage) ----
function buildMaze(key){
  const S=SIZES[key]; COLS=S.cols; ROWS=S.rows; TILE=S.tile;
  cv.width=COLS*TILE; cv.height=ROWS*TILE;
  grid=[];
  for(let r=0;r<ROWS;r++){ const row=[]; for(let c=0;c<COLS;c++){
    row.push((r===0||r===ROWS-1||c===0||c===COLS-1)?'#':'.');
  } grid.push(row); }
  // piliers (cases paires) : on n'ajoute que des murs d'un quadrillage connecté
  for(let r=2;r<ROWS-1;r+=2) for(let c=2;c<COLS-1;c+=2){ if(Math.random()<0.55) grid[r][c]='#'; }
  // tunnel latéral
  if(S.tunnel){ const m=ROWS>>1; grid[m][0]=' '; grid[m][COLS-1]=' '; grid[m][1]='.'; grid[m][COLS-2]='.'; }
  // grosses pastilles dans les coins
  for(const corner of [[1,1],[COLS-2,1],[1,ROWS-2],[COLS-2,ROWS-2]]) grid[corner[1]][corner[0]]='o';
  // positions de départ (on ouvre les cases pour les garantir libres et reliées)
  const cx=COLS>>1, cy=ROWS>>1;
  PAC={c:cx, r:ROWS-2};
  GHOSTS=[[cx,cy],[cx-2,cy],[cx+2,cy],[cx,cy-2]].filter(g=>g[0]>0&&g[0]<COLS-1&&g[1]>0&&g[1]<ROWS-1);
  grid[PAC.r][PAC.c]=' ';
  for(const g of GHOSTS) grid[g[1]][g[0]]=' ';
  dotsLeft=0; for(const row of grid) for(const ch of row) if(ch==='.'||ch==='o') dotsLeft++;
}
function isWall(c,r){ return r<0||r>=ROWS||grid[r][c]==='#'; }
function wrapC(c){ return (c%COLS+COLS)%COLS; }

function resetActors(){
  pac={ c:PAC.c, r:PAC.r, pc:PAC.c, pr:PAC.r, dir:{x:0,y:0}, want:{x:0,y:0} };
  ghosts=GHOSTS.map((g,i)=>({ c:g[0], r:g[1], pc:g[0], pr:g[1], dir:{x:0,y:-1}, color:GHOST_COLS[i%4], home:{c:g[0],r:g[1]} }));
  scared=0;
}
function setupSize(key){
  currentSize=key;
  document.querySelectorAll('#sizes button').forEach(b=>b.classList.toggle('on', b.dataset.s===key));
  running=false;
  buildMaze(key); resetActors();
  ovT.textContent='Pac-Man';
  ovS.textContent='Terrain '+({small:'petit',medium:'moyen',large:'grand'}[key])+'. Mange toutes les pastilles, évite les fantômes, croque-les après une grosse pastille.';
  document.getElementById('play').textContent='Jouer ▶';
  ov.classList.remove('hide');
  draw(1);
}
function newGame(){
  buildMaze(currentSize); resetActors();
  score=0; lives=3; running=true; scared=0;
  scoreEl.textContent=0; drawLives(); ov.classList.add('hide');
  stepAcc=0; lastFrame=performance.now(); requestAnimationFrame(loop);
}
function drawLives(){ livesEl.innerHTML=''; for(let i=0;i<lives;i++){ livesEl.appendChild(document.createElement('i')); } }

// ---- déplacements (avec tunnel) ----
function tryTurn(a){
  if(!(a.want.x||a.want.y)) return;
  const nc=wrapC(a.c+a.want.x), nr=a.r+a.want.y;
  if(!isWall(nc,nr)) a.dir={...a.want};
}
function stepActor(a){
  a.pc=a.c; a.pr=a.r;
  const nc=wrapC(a.c+a.dir.x), nr=a.r+a.dir.y;
  if(!isWall(nc,nr)){ a.c=nc; a.r=nr; if(Math.abs(a.c-a.pc)>1) a.pc=a.c; }
}
function ghostChoose(g){
  const dirs=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}];
  let opts=dirs.filter(d=>{
    if(isWall(wrapC(g.c+d.x), g.r+d.y)) return false;
    if(d.x===-g.dir.x && d.y===-g.dir.y) return false;
    return true;
  });
  if(!opts.length) opts=dirs.filter(d=>!isWall(wrapC(g.c+d.x),g.r+d.y));
  if(!opts.length) return;
  if(scared>0){ g.dir=opts[Math.random()*opts.length|0]; return; }
  let bestD=Infinity, bd=opts[0];
  for(const d of opts){
    const dx=wrapC(g.c+d.x)-pac.c, dy=(g.r+d.y)-pac.r, dist=dx*dx+dy*dy;
    if(dist<bestD){ bestD=dist; bd=d; }
  }
  g.dir=bd;
}
function eatAt(c,r){
  const cell=grid[r][c];
  if(cell==='.'){ grid[r][c]=' '; score+=10; dotsLeft--; }
  else if(cell==='o'){ grid[r][c]=' '; score+=50; dotsLeft--; scared=Math.round(7000/STEP); }
  scoreEl.textContent=score;
  if(score>best){ best=score; bestEl.textContent=best; Arcade.saveBest('pacman',best); }
}
function collide(){
  for(const g of ghosts){
    const same=g.c===pac.c && g.r===pac.r;
    const swap=g.c===pac.pc && g.r===pac.pr && g.pc===pac.c && g.pr===pac.r;
    if(same||swap){
      if(scared>0){ score+=200; scoreEl.textContent=score; g.c=g.home.c; g.r=g.home.r; g.pc=g.c; g.pr=g.r; g.dir={x:0,y:-1}; }
      else return true;
    }
  }
  return false;
}
function stepGame(){
  tryTurn(pac); stepActor(pac); eatAt(pac.c,pac.r);
  for(const g of ghosts){ ghostChoose(g); stepActor(g); }
  if(scared>0) scared--;
  if(collide()){ lives--; drawLives(); if(lives<=0) return gameOver(false); resetActors(); }
  if(dotsLeft<=0) return gameOver(true);
}
function gameOver(win){
  running=false; Arcade.saveBest('pacman',best);
  ovT.textContent = win ? 'Gagné !' : 'Perdu';
  ovS.innerHTML = 'Score : <b style="color:var(--pac)">'+score+'</b>'+(score>=best&&score>0?' — nouveau record ! 🏆':'');
  document.getElementById('play').textContent = win ? 'Rejouer ▶' : 'Réessayer ▶';
  ov.classList.remove('hide');
}

// ---- rendu ----
function loop(now){
  const dt=now-lastFrame; lastFrame=now;
  if(running){ stepAcc+=dt; while(stepAcc>=STEP){ stepAcc-=STEP; stepGame(); if(!running) break; } }
  draw(running?stepAcc/STEP:1);
  mouth=(mouth+dt*0.012)%(Math.PI*2);
  if(running) requestAnimationFrame(loop);
}
function lerp(a,b,t){ return a+(b-a)*t; }
function draw(t){
  ctx.fillStyle='#05050c'; ctx.fillRect(0,0,cv.width,cv.height);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const cell=grid[r][c];
    if(cell==='#'){
      ctx.fillStyle='#0c1240'; ctx.fillRect(c*TILE+1,r*TILE+1,TILE-2,TILE-2);
      ctx.strokeStyle='#2944d8'; ctx.lineWidth=2; ctx.strokeRect(c*TILE+2.5,r*TILE+2.5,TILE-5,TILE-5);
    } else if(cell==='.'){
      ctx.fillStyle='#ffd24a'; ctx.beginPath(); ctx.arc(c*TILE+TILE/2,r*TILE+TILE/2,Math.max(1.8,TILE*0.09),0,7); ctx.fill();
    } else if(cell==='o'){
      ctx.fillStyle='#ffd24a'; ctx.shadowColor='#ffd24a'; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(c*TILE+TILE/2,r*TILE+TILE/2,TILE*0.22,0,7); ctx.fill(); ctx.shadowBlur=0;
    }
  }
  const px=(lerp(pac.pc,pac.c,t)+.5)*TILE, py=(lerp(pac.pr,pac.r,t)+.5)*TILE;
  const ang=Math.atan2(pac.dir.y,pac.dir.x), m=Math.abs(Math.sin(mouth))*0.32+0.04;
  ctx.fillStyle='#ffe23d'; ctx.shadowColor='#ffe23d'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.moveTo(px,py); ctx.arc(px,py,TILE/2-1, ang+m, ang+Math.PI*2-m); ctx.closePath(); ctx.fill(); ctx.shadowBlur=0;
  for(const g of ghosts){
    const gx=(lerp(g.pc,g.c,t)+.5)*TILE, gy=(lerp(g.pr,g.r,t)+.5)*TILE, rad=TILE/2-1;
    ctx.fillStyle = scared>0 ? ((scared<12 && scared%2)?'#fff':'#2944d8') : g.color;
    ctx.beginPath(); ctx.arc(gx,gy-1,rad,Math.PI,0); ctx.lineTo(gx+rad,gy+rad);
    for(let k=0;k<3;k++){ ctx.lineTo(gx+rad-(k*2+1)*rad/3, gy+rad-(k%2?0:4)); }
    ctx.lineTo(gx-rad,gy+rad); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(gx-rad/2.6,gy-2,rad*0.22,0,7); ctx.arc(gx+rad/2.6,gy-2,rad*0.22,0,7); ctx.fill();
    ctx.fillStyle='#0a0a1a'; ctx.beginPath(); ctx.arc(gx-rad/2.6+g.dir.x,gy-2+g.dir.y,rad*0.11,0,7); ctx.arc(gx+rad/2.6+g.dir.x,gy-2+g.dir.y,rad*0.11,0,7); ctx.fill();
  }
}

// ---- contrôles ----
const DIRS={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
document.addEventListener('keydown',e=>{ if(DIRS[e.key]){ e.preventDefault(); if(pac) pac.want=DIRS[e.key]; } });
let sx,sy;
cv.addEventListener('touchstart',e=>{const t=e.touches[0];sx=t.clientX;sy=t.clientY;},{passive:true});
cv.addEventListener('touchend',e=>{
  if(sx==null||!pac) return;
  const t=e.changedTouches[0], dx=t.clientX-sx, dy=t.clientY-sy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<20) return;
  if(Math.abs(dx)>Math.abs(dy)) pac.want={x:dx>0?1:-1,y:0}; else pac.want={x:0,y:dy>0?1:-1};
  sx=sy=null;
},{passive:true});

document.getElementById('sizes').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b) return; setupSize(b.dataset.s);
});
document.getElementById('play').onclick=newGame;

setupSize('medium');
</script>
</body>
</html>
