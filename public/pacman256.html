<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(!localStorage.getItem('arcade_token'))location.replace('index.html');</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pac-Man 256</title>
<style>
  :root{ --bg:#04040b; --pac:#ffe21a; --ink:#dfe9ff; --dim:#67739a; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:radial-gradient(circle at 50% -10%, #0a0f2a, var(--bg) 65%);color:var(--ink);
    font-family:"Segoe UI",system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;gap:12px;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none;}
  h1{font-size:clamp(20px,5.5vw,32px);letter-spacing:.28em;font-weight:800;text-transform:uppercase;
    padding-left:.28em;color:#fff;text-shadow:0 0 8px #1f4dff,0 0 22px var(--pac);}
  h1 span{color:var(--pac)}
  .wrap{position:relative;width:min(92vw,360px);aspect-ratio:11/18}
  canvas{width:100%;height:100%;display:block;border-radius:14px;background:#04040b;border:1px solid #16225e;
    box-shadow:0 0 0 1px #0a1230,0 24px 60px -20px #000,inset 0 0 50px -22px #1f4dff;touch-action:none;}
  .menu{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;background:rgba(4,4,11,.82);backdrop-filter:blur(3px);border-radius:14px;text-align:center;padding:24px;}
  .menu.hidden{display:none}
  .menu .big{font-size:clamp(18px,5vw,26px);color:#fff;letter-spacing:.12em;text-transform:uppercase}
  .menu p{color:var(--dim);font-size:13px;line-height:1.7;max-width:31ch}
  button{font:inherit;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#04040b;background:var(--pac);
    border:none;border-radius:10px;padding:13px 26px;cursor:pointer;box-shadow:0 0 18px -2px var(--pac);transition:transform .08s;}
  button:hover{transform:translateY(-2px)} button:active{transform:translateY(0)}
  button:focus-visible{outline:3px solid #fff;outline-offset:2px}
  .hint{color:var(--dim);font-size:12px;letter-spacing:.06em;text-align:center;max-width:92vw}
  .back{position:fixed;top:10px;left:10px;z-index:99;font-size:13px;font-weight:700;text-decoration:none;color:#e8f0ff;background:rgba(20,22,30,.66);border:1px solid rgba(255,255,255,.18);padding:7px 13px;border-radius:10px;backdrop-filter:blur(6px)}
</style>
</head>
<body>
  <a href="index.html" class="back">← Menu</a>
  <h1>Pac-Man <span>256</span></h1>
  <div class="wrap">
    <canvas id="c" width="330" height="540"></canvas>
    <div class="menu" id="menu">
      <div class="big">Pac-Man 256</div>
      <p>Une seule vie. Grimpe sans fin, enchaîne les pac-gommes (bonus 16/32/64/128, nuke à 256), gobe fruits, armes et pièces, évite les fantômes — et garde de l'avance sur le glitch.</p>
      <button id="play">Jouer</button>
    </div>
  </div>
  <div class="hint">Flèches / WASD · glisse au doigt · P : pause</div>

<script src="auth.js"></script>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
const W=cv.width, H=cv.height, TILE=30, COLS=11;
const menu=document.getElementById('menu');

let actx, chompFlip=false;
function tone(f,d=0.05,t='square',v=0.04){try{
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;
  o.connect(g);g.connect(actx.destination);o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+d);o.stop(actx.currentTime+d);
}catch(e){}}
function chomp(){chompFlip=!chompFlip;tone(chompFlip?280:200,.03,'square',.025);}

// ---------- maze ----------
const rows=new Map();
const VARIANTS=["#.#.#.#.#.#","#....#....#","#.#.....#.#","#...#.#...#","#.##...##.#","#.#...#.#.#",
                "#..#.#.#..#","#.###.###.#","#....#....#","#.#.#...#.#"];
let items=[]; // {col,row,kind,...}
const FRUITS=[{k:'cherry',m:2,c:'#ff3b5c'},{k:'apple',m:3,c:'#7CFC00'},{k:'straw',m:4,c:'#ff2e88'},
              {k:'orange',m:5,c:'#ff9a1f'},{k:'melon',m:6,c:'#9be15d'}];
const WEAPONS={
  laser:{c:'#23e7ff',s:'⚡',dur:340,inv:true}, freeze:{c:'#9fe3ff',s:'❄',dur:360,inv:false},
  bomb:{c:'#ff5e3a',s:'✸',dur:280,inv:true}, giant:{c:'#ffd400',s:'◎',dur:340,inv:true},
  magnet:{c:'#b06bff',s:'⊓',dur:360,inv:false}, tornado:{c:'#7fffd4',s:'🌀',dur:320,inv:false},
  fire:{c:'#ff7a1f',s:'🔥',dur:320,inv:true}, stealth:{c:'#c9c9ff',s:'◇',dur:340,inv:true}
};
const WKEYS=Object.keys(WEAPONS);

function genRow(r){
  if(rows.has(r))return rows.get(r);
  const arr=new Array(COLS).fill(0);
  const even=(((r%2)+2)%2)===0;
  if(even){for(let c=1;c<COLS-1;c++)arr[c]=1;}
  else{const t=VARIANTS[(Math.random()*VARIANTS.length)|0];for(let c=0;c<COLS;c++)arr[c]=t[c]==='#'?0:1;}
  arr[0]=0;arr[COLS-1]=0;
  if(even && r<4){
    const oc=[];for(let c=1;c<COLS-1;c++)if(arr[c]!==0)oc.push(c);
    const rnd=Math.random(), pick=()=>oc[(Math.random()*oc.length)|0];
    if(oc.length){
      if(rnd<0.09){arr[pick()]=3;}                                   // power pellet
      else if(rnd<0.135){const c=pick();arr[c]=2;items.push({col:c,row:r,kind:'fruit',fruit:FRUITS[(Math.random()*5)|0]});}
      else if(rnd<0.185){const c=pick();arr[c]=2;items.push({col:c,row:r,kind:'weapon',wk:WKEYS[(Math.random()*WKEYS.length)|0]});}
      else if(rnd<0.235){const c=pick();arr[c]=2;items.push({col:c,row:r,kind:'coin'});}
    }
  }
  rows.set(r,arr);return arr;
}
function isWall(col,row){if(col<1||col>COLS-2)return true;return genRow(row)[col]===0;}
const ccx=c=>c*TILE+TILE/2, ccy=r=>r*TILE+TILE/2;
const colOf=px=>Math.round((px-TILE/2)/TILE), rowOf=py=>Math.round((py-TILE/2)/TILE);

// ---------- state ----------
let player, ghosts, effects, fireTiles, tornado, cam, scrollSpeed, score, depthBest, best=0;
let powerT, pelletScore, mult, multT, chain, weapon, weaponT, weaponLvl, msg, msgT;
let alive=false, paused=false, over=false, invuln=0, spawnT=0, funkyT=0, t=0;
let lastDir={x:0,y:-1};

function reset(){
  rows.clear(); items=[]; ghosts=[]; effects=[]; fireTiles=new Map(); tornado=null;
  player={px:ccx(5),py:ccy(6),dir:{x:0,y:0},want:{x:0,y:0},speed:2.45,mouth:0,cell:{c:5,r:6}};
  cam=player.py-H*0.55; scrollSpeed=0.32; score=0; depthBest=6;
  powerT=0; pelletScore=10; mult=1; multT=0; chain=0; weapon=null; weaponT=0; weaponLvl=0;
  msg=''; msgT=0; invuln=70; spawnT=70; funkyT=820; over=false; paused=false; t=0; lastDir={x:0,y:-1};
  alive=true; menu.classList.add('hidden');
}

// ---------- input ----------
function setWant(x,y){player.want={x,y};}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();
  if(k==='p'&&alive&&!over){paused=!paused;return;}
  if(!alive)return;
  if(k==='arrowup'||k==='w')setWant(0,-1);else if(k==='arrowdown'||k==='s')setWant(0,1);
  else if(k==='arrowleft'||k==='a')setWant(-1,0);else if(k==='arrowright'||k==='d')setWant(1,0);});
let tsx=0,tsy=0;
cv.addEventListener('touchstart',e=>{e.preventDefault();tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const t0=e.touches[0],dx=t0.clientX-tsx,dy=t0.clientY-tsy;
  if(Math.hypot(dx,dy)<16||!alive)return;
  if(Math.abs(dx)>Math.abs(dy))setWant(dx>0?1:-1,0);else setWant(0,dy>0?1:-1);
  tsx=t0.clientX;tsy=t0.clientY;},{passive:false});
document.getElementById('play').onclick=()=>{tone(660);reset();};

// ---------- movement ----------
function tryTurn(e){
  if(e.want.x===e.dir.x&&e.want.y===e.dir.y)return;
  if(e.want.x===0&&e.want.y===0)return;
  const col=colOf(e.px),row=rowOf(e.py),cx=ccx(col),cy=ccy(row);
  if(e.want.x!==0){if(Math.abs(e.py-cy)<e.speed+0.8&&!isWall(col+e.want.x,row)){e.py=cy;e.dir={...e.want};}}
  else{if(Math.abs(e.px-cx)<e.speed+0.8&&!isWall(col,row+e.want.y)){e.px=cx;e.dir={...e.want};}}
}
function step(e){
  const col=colOf(e.px),row=rowOf(e.py),cx=ccx(col),cy=ccy(row);
  let nx=e.px+e.dir.x*e.speed, ny=e.py+e.dir.y*e.speed;
  if(e.dir.x>0&&isWall(col+1,row)&&nx>cx)nx=cx;
  else if(e.dir.x<0&&isWall(col-1,row)&&nx<cx)nx=cx;
  else if(e.dir.y>0&&isWall(col,row+1)&&ny>cy)ny=cy;
  else if(e.dir.y<0&&isWall(col,row-1)&&ny<cy)ny=cy;
  if(e.dir.x!==0)ny=cy; if(e.dir.y!==0)nx=cx;
  e.px=nx;e.py=ny;
}

// ---------- ghosts ----------
const GTYPES={red:'#ff2d2d',pink:'#ff8ad6',cyan:'#22d3ee',orange:'#ffae3a',green:'#3bff7a',purple:'#b06bff'};
const rotCCW=d=>({x:d.y,y:-d.x}), rotCW=d=>({x:-d.y,y:d.x});
function spawnGhost(type,col,row,dir){ghosts.push({px:ccx(col),py:ccy(row),dir:dir||{x:0,y:1},speed:1.5,type,fright:false,frozen:false,hue:GTYPES[type]});}
function spawnAbove(type){const top=rowOf(cam)-1;
  for(let i=0;i<24;i++){const r=top-(2+((Math.random()*4)|0)),c=1+((Math.random()*(COLS-2))|0);if(!isWall(c,r)){spawnGhost(type,c,r);return;}}}
function spawnChain(type){const top=rowOf(cam)-2;
  for(let i=0;i<20;i++){const r=top-(1+((Math.random()*3)|0));if((((r%2)+2)%2)!==0)continue;
    for(let c=1;c<=4;c++)spawnGhost(type,c+2,r,{x:1,y:0});return;}}
function lineOfSight(col,row){ // pink: clear straight line to player
  const pc=colOf(player.px),pr=rowOf(player.py);
  if(row===pr){const a=Math.min(col,pc),b=Math.max(col,pc);for(let c=a;c<=b;c++)if(isWall(c,row))return false;return true;}
  if(col===pc){const a=Math.min(row,pr),b=Math.max(row,pr);for(let r=a;r<=b;r++)if(isWall(col,r))return false;return true;}
  return false;
}
function ghostThink(g){
  const col=colOf(g.px),row=rowOf(g.py),cx=ccx(col),cy=ccy(row);
  if(Math.abs(g.px-cx)>g.speed||Math.abs(g.py-cy)>g.speed)return;
  g.px=cx;g.py=cy;
  const all=[{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}], open=d=>!isWall(col+d.x,row+d.y);
  if(g.type==='green'||g.type==='purple'){ if(open(g.dir))return; g.dir={x:-g.dir.x,y:0}; if(!open(g.dir))g.dir={x:0,y:1}; return; }
  const opts=all.filter(d=>!(d.x===-g.dir.x&&d.y===-g.dir.y)&&open(d));
  if(!opts.length){g.dir={x:-g.dir.x,y:-g.dir.y};return;}
  if(g.fright||weapon==='stealth'){g.dir=opts[(Math.random()*opts.length)|0];return;}
  if(g.type==='cyan'){for(const d of [rotCCW(g.dir),g.dir,rotCW(g.dir),{x:-g.dir.x,y:-g.dir.y}])if(open(d)){g.dir=d;return;}return;}
  if(g.type==='orange'){let bd=-1,b=opts[0];for(const d of opts){const s=d.y*2+Math.random();if(s>bd){bd=s;b=d;}}g.dir=b;return;}
  if(g.type==='pink'&&!lineOfSight(col,row)){g.dir=opts[(Math.random()*opts.length)|0];return;}
  let bd=1e9,b=opts[0];
  for(const d of opts){const dist=Math.hypot(ccx(col+d.x)-player.px,ccy(row+d.y)-player.py)+Math.random()*16;if(dist<bd){bd=dist;b=d;}}
  g.dir=b;
}

// ---------- effects / weapons ----------
function flash(x){msg=x;msgT=70;}
function boom(x,y,r,color){effects.push({x,y,r:0,max:r,color,life:1});}
function killGhost(i,pts){const g=ghosts[i];boom(g.px,g.py,TILE,'#fff');ghosts.splice(i,1);if(pts){score+=pts;flash('+'+pts);}tone(820,.07,'sine',.05);}
function nukeGhosts(){for(let i=ghosts.length-1;i>=0;i--){boom(ghosts[i].px,ghosts[i].py,TILE,'#ff5');ghosts.splice(i,1);}tone(120,.4,'sawtooth',.07);}
function eatPellet(){powerT=380;pelletScore=10;for(const g of ghosts){g.fright=true;g.frozen=false;}tone(520,.12,'sine',.05);}
function eatFruit(f){mult=f.m;multT=480;score+=60*f.m;flash('x'+f.m);tone(700,.1,'triangle',.05);}
function killPts(){return Math.round(100*(1+weaponLvl*0.5))*mult;}
function giveWeapon(wk){const base=WEAPONS[wk].dur*(1+weaponLvl*0.2);
  if(weapon===wk)weaponT=Math.min(weaponT+base,base*1.6);else{weapon=wk;weaponT=base;}
  if(wk==='tornado')tornado={px:player.px,py:player.py};
  if(wk==='freeze')for(const g of ghosts)g.frozen=true;
  flash(wk.toUpperCase());tone(440,.1,'square',.05);}
function detonate(){boom(player.px,player.py,TILE*2.6,'#ff7a3a');
  for(let i=ghosts.length-1;i>=0;i--)if(Math.hypot(ghosts[i].px-player.px,ghosts[i].py-player.py)<TILE*2.6)killGhost(i,killPts());
  weapon=null;weaponT=0;tone(90,.3,'sawtooth',.07);}
function weaponTick(){
  if(!weapon)return;
  if(WEAPONS[weapon].inv)invuln=Math.max(invuln,2);
  if(weapon==='laser'){const d=(player.dir.x||player.dir.y)?player.dir:lastDir;
    for(let i=ghosts.length-1;i>=0;i--){const g=ghosts[i];
      const al=(d.x!==0&&Math.abs(g.py-player.py)<TILE*0.5&&Math.sign(g.px-player.px)===d.x)||
               (d.y!==0&&Math.abs(g.px-player.px)<TILE*0.5&&Math.sign(g.py-player.py)===d.y);
      if(al&&Math.hypot(g.px-player.px,g.py-player.py)<TILE*9)killGhost(i,killPts());}}
  else if(weapon==='freeze')for(const g of ghosts)g.frozen=true;
  else if(weapon==='giant'){for(let i=ghosts.length-1;i>=0;i--)if(Math.hypot(ghosts[i].px-player.px,ghosts[i].py-player.py)<TILE*1.1)killGhost(i,killPts());}
  else if(weapon==='bomb'){for(const g of ghosts)if(Math.hypot(g.px-player.px,g.py-player.py)<TILE*0.8){detonate();return;}}
  else if(weapon==='magnet'){for(let r=rowOf(player.py)-1;r<=rowOf(player.py)+1;r++)for(let c=colOf(player.px)-1;c<=colOf(player.px)+1;c++){
      const a=genRow(r);if(c>0&&c<COLS-1&&a[c]===1){a[c]=2;score+=10*mult;}}}
  else if(weapon==='tornado'){if(!tornado)tornado={px:player.px,py:player.py};
    let nd=1e9,ng=null;for(const g of ghosts){const d=Math.hypot(g.px-tornado.px,g.py-tornado.py);if(d<nd){nd=d;ng=g;}}
    if(ng){tornado.px+=Math.sign(ng.px-tornado.px)*3.4;tornado.py+=Math.sign(ng.py-tornado.py)*3.4;
      const i=ghosts.indexOf(ng);if(Math.hypot(ng.px-tornado.px,ng.py-tornado.py)<TILE*0.6)killGhost(i,killPts());}}
  else if(weapon==='fire'){fireTiles.set(colOf(player.px)+','+rowOf(player.py),40);
    for(let i=ghosts.length-1;i>=0;i--){const k=colOf(ghosts[i].px)+','+rowOf(ghosts[i].py);if(fireTiles.has(k))killGhost(i,killPts());}}
  // stealth handled in ghostThink (random) + invuln
  weaponT--;
  if(weaponT<=0){if(weapon==='bomb')detonate();weapon=null;weaponT=0;if(weapon!=='tornado')tornado=null;tornado=null;}
}

// ---------- update ----------
function update(){
  if(!alive||paused||over)return;
  t++;
  tryTurn(player);step(player);
  if(player.dir.x||player.dir.y){const tri=Math.abs(((t*0.16)%2)-1);player.mouth=tri*0.30*Math.PI;}
  else player.mouth=0.16*Math.PI;
  if(player.dir.x||player.dir.y)lastDir={...player.dir};

  const pc=colOf(player.px),pr=rowOf(player.py);
  if(pc!==player.cell.c||pr!==player.cell.r){
    player.cell={c:pc,r:pr};
    const arr=genRow(pr),v=arr[pc];
    if(v===1){arr[pc]=2;score+=10*mult;chomp();chain++;
      if(chain===16||chain===32||chain===64||chain===128){score+=chain*mult;flash('CHAIN '+chain);tone(660,.1,'square',.05);}
      if(chain>=256){score+=2560*mult;flash('256 !!');nukeGhosts();weapon=null;weaponT=0;powerT=0;chain=0;}}
    else if(v===3){arr[pc]=2;score+=50*mult;eatPellet();}
    else{const idx=items.findIndex(it=>it.col===pc&&it.row===pr);
      if(idx>=0){const it=items[idx];
        if(it.kind==='fruit')eatFruit(it.fruit);
        else if(it.kind==='weapon')giveWeapon(it.wk);
        else if(it.kind==='coin'){weaponLvl=Math.min(5,weaponLvl+1);flash('UPGRADE '+weaponLvl);tone(900,.08,'square',.04);}
        items.splice(idx,1);}
      else chain=0;}
  }
  if(pr<depthBest){score+=(depthBest-pr)*5;depthBest=pr;}
  const depth=Math.max(0,6-depthBest);
  scrollSpeed=Math.min(1.7,0.32+depth*0.0011);
  cam=Math.min(cam-scrollSpeed,player.py-H*0.55);

  if(multT>0&&--multT===0)mult=1;
  if(powerT>0&&--powerT===0){pelletScore=10;for(const g of ghosts)g.fright=false;}
  if(invuln>0)invuln--;
  if(msgT>0)msgT--;
  weaponTick();
  if(weapon!=='freeze')for(const g of ghosts)if(g.frozen&&!g.fright)g.frozen=false;
  // fire tiles decay
  for(const [k,v] of fireTiles){const nv=v-1;if(nv<=0)fireTiles.delete(k);else fireTiles.set(k,nv);}

  spawnT--;
  const maxG=Math.min(6,2+(depth/28|0));
  if(spawnT<=0&&ghosts.length<maxG){const pool=['red','pink','cyan','orange','red'];spawnAbove(pool[(Math.random()*pool.length)|0]);spawnT=Math.max(38,148-depth*0.6);}
  funkyT--;if(funkyT<=0){spawnChain(Math.random()<0.5?'green':'purple');funkyT=820;}

  for(const g of ghosts){g.speed=g.frozen?0.25:(g.fright?1.0:Math.min(2.15,1.42+depth*0.0007));ghostThink(g);step(g);}

  const big=weapon==='giant';
  for(let i=ghosts.length-1;i>=0;i--){const g=ghosts[i];
    if(Math.hypot(g.px-player.px,g.py-player.py)<TILE*(big?1.05:0.7)){
      if(g.fright){killGhost(i,pelletScore*mult);pelletScore+=10;}
      else if(big){killGhost(i,killPts());}
      else if(invuln<=0){endGame();return;}}}
  if(player.py-cam>H-TILE*0.55&&invuln<=0){endGame();return;}

  for(const e of effects){e.r+=(e.max-e.r)*0.25;e.life-=0.06;}
  effects=effects.filter(e=>e.life>0);
  const botRow=rowOf(cam+H)+4;
  for(const r of rows.keys())if(r>botRow+2)rows.delete(r);
  ghosts=ghosts.filter(g=>g.py<cam+H+TILE*3);
  items=items.filter(it=>it.row<botRow+2);
}

function endGame(){over=true;alive=false;best=Math.max(best,score);if(window.Arcade)Arcade.saveBest('pacman256',score);boom(player.px,player.py,TILE*1.6,'#fff');tone(140,.4,'sawtooth',.07);
  menu.querySelector('.big').textContent='Score : '+score;
  menu.querySelector('p').textContent='Profondeur '+(6-depthBest)+' · meilleur '+best;
  document.getElementById('play').textContent='Rejouer';menu.classList.remove('hidden');}

// ---------- render ----------
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function drawGhost(g){const sx=g.px,sy=g.py-cam,r=TILE*0.42,blink=g.fright&&powerT<90&&((t>>3)&1);
  ctx.save();ctx.fillStyle=g.fright?(blink?'#fff':'#2b3bff'):g.hue;ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(sx,sy-2,r,Math.PI,0);ctx.lineTo(sx+r,sy+r-2);
  for(let i=0;i<3;i++){const seg=r*2/3;ctx.lineTo(sx+r-seg*(i+0.5),sy+r-8);ctx.lineTo(sx+r-seg*(i+1),sy+r-2);}
  ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  if(g.frozen){ctx.strokeStyle='rgba(180,240,255,.9)';ctx.lineWidth=2;ctx.strokeRect(sx-r,sy-r,r*2,r*2);}
  if(!g.fright){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx-5,sy-3,4,0,7);ctx.arc(sx+5,sy-3,4,0,7);ctx.fill();
    ctx.fillStyle='#0a1230';ctx.beginPath();ctx.arc(sx-5+g.dir.x*2,sy-3+g.dir.y*2,2,0,7);ctx.arc(sx+5+g.dir.x*2,sy-3+g.dir.y*2,2,0,7);ctx.fill();}
  else if(!blink){ctx.fillStyle='#ffd9a0';ctx.beginPath();ctx.arc(sx-4,sy-3,1.8,0,7);ctx.arc(sx+4,sy-3,1.8,0,7);ctx.fill();}
  ctx.restore();}
const GLITCH='0123456789ABCDEF#@%&*<>/\\PACMAN256';
function render(){
  ctx.clearRect(0,0,W,H);
  const r0=rowOf(cam)-1,r1=rowOf(cam+H)+1;
  for(let r=r0;r<=r1;r++){const arr=genRow(r),sy=ccy(r)-cam;
    for(let c=0;c<COLS;c++){const sx=ccx(c);
      if(arr[c]===0){const g=ctx.createLinearGradient(sx-15,sy-15,sx+15,sy+15);g.addColorStop(0,'#1f4dff');g.addColorStop(1,'#0a1f7a');
        ctx.fillStyle=g;ctx.shadowColor='#1f4dff';ctx.shadowBlur=6;rr(sx-TILE/2+2,sy-TILE/2+2,TILE-4,TILE-4,6);ctx.fill();ctx.shadowBlur=0;}
      else if(arr[c]===1){ctx.fillStyle='#ffd9a0';ctx.beginPath();ctx.arc(sx,sy,2.6,0,7);ctx.fill();}
      else if(arr[c]===3){const p=3+Math.sin(t*0.2)*2;ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(sx,sy,4+p,0,7);ctx.fill();ctx.shadowBlur=0;}
    }}
  // fire tiles
  for(const k of fireTiles.keys()){const [c,r]=k.split(',').map(Number);const sx=ccx(c),sy=ccy(r)-cam;
    ctx.fillStyle='rgba(255,'+(120+((Math.random()*100)|0))+',20,.7)';ctx.beginPath();ctx.arc(sx,sy,8+Math.random()*4,0,7);ctx.fill();}
  // items
  for(const it of items){const sx=ccx(it.col),sy=ccy(it.row)-cam;if(sy<-20||sy>H+20)continue;
    if(it.kind==='fruit'){ctx.fillStyle=it.fruit.c;ctx.shadowColor=it.fruit.c;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(sx,sy,7,0,7);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#3a2a00';ctx.fillRect(sx-1,sy-11,2,4);}
    else if(it.kind==='coin'){ctx.fillStyle='#ffd400';ctx.shadowColor='#ffd400';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(sx,sy,6,0,7);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#7a5a00';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',sx,sy+1);ctx.textBaseline='alphabetic';}
    else{const w=WEAPONS[it.wk];ctx.fillStyle=w.c;ctx.shadowColor=w.c;ctx.shadowBlur=10;rr(sx-9,sy-9,18,18,5);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#04040b';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(w.s,sx,sy+1);ctx.textBaseline='alphabetic';}}
  // laser beam
  if(weapon==='laser'){const d=(player.dir.x||player.dir.y)?player.dir:lastDir;const px=player.px,py=player.py-cam;
    ctx.save();ctx.strokeStyle='rgba(35,231,255,.85)';ctx.lineWidth=6;ctx.shadowColor='#23e7ff';ctx.shadowBlur=14;ctx.beginPath();ctx.moveTo(px,py);ctx.lineTo(px+d.x*TILE*9,py+d.y*TILE*9);ctx.stroke();ctx.restore();}
  // tornado
  if(weapon==='tornado'&&tornado){ctx.save();ctx.translate(tornado.px,tornado.py-cam);ctx.rotate(t*0.5);ctx.strokeStyle='#7fffd4';ctx.lineWidth=3;ctx.shadowColor='#7fffd4';ctx.shadowBlur=12;
    ctx.beginPath();for(let a=0;a<12;a++){const rad=3+a*1.4;ctx.lineTo(Math.cos(a*0.9)*rad,Math.sin(a*0.9)*rad);}ctx.stroke();ctx.restore();}
  for(const g of ghosts)drawGhost(g);
  // player
  const psx=player.px,psy=player.py-cam;let ang;
  if(player.dir.x>0)ang=0;else if(player.dir.x<0)ang=Math.PI;else if(player.dir.y<0)ang=-Math.PI/2;else if(player.dir.y>0)ang=Math.PI/2;
  else{const d=lastDir;ang=d.x>0?0:d.x<0?Math.PI:d.y<0?-Math.PI/2:Math.PI/2;}
  const pr2=TILE*(weapon==='giant'?0.72:0.44);
  ctx.save();
  if((invuln>0&&((t>>2)&1))||weapon==='stealth')ctx.globalAlpha=0.4;
  const body=weapon==='bomb'?'#ff5e3a':'#ffe21a';
  ctx.fillStyle=body;ctx.shadowColor=body;ctx.shadowBlur=14;
  // corps + bouche (secteur orienté dans le sens du déplacement, comme l'original)
  ctx.beginPath();ctx.moveTo(psx,psy);
  ctx.arc(psx,psy,pr2,ang+player.mouth,ang+Math.PI*2-player.mouth);
  ctx.closePath();ctx.fill();
  ctx.shadowBlur=0;
  // œil : perpendiculaire au sens de déplacement, légèrement vers l'avant (comme le Pac-Man original)
  const ux=Math.sin(ang), uy=-Math.cos(ang);   // perpendiculaire « haut »
  const fx=Math.cos(ang), fy=Math.sin(ang);    // avant
  const eyeX=psx+ux*pr2*0.45+fx*pr2*0.10;
  const eyeY=psy+uy*pr2*0.45+fy*pr2*0.10;
  ctx.fillStyle='#16213e';
  ctx.beginPath();ctx.arc(eyeX,eyeY,pr2*0.15,0,7);ctx.fill();
  ctx.restore();
  for(const e of effects){ctx.save();ctx.globalAlpha=Math.max(0,e.life);ctx.strokeStyle=e.color;ctx.lineWidth=3;ctx.beginPath();ctx.arc(e.x,e.y-cam,e.r,0,7);ctx.stroke();ctx.restore();}
  // glitch (garbled characters rising from bottom)
  const gy=H-TILE*0.9;ctx.save();ctx.font='14px monospace';ctx.textAlign='center';
  for(let i=0;i<60;i++){const x=Math.random()*W,y=gy+Math.random()*(H-gy);
    ctx.fillStyle='hsl('+((Math.random()*360)|0)+' 90% '+(45+(Math.random()*40|0))+'%)';
    ctx.fillText(GLITCH[(Math.random()*GLITCH.length)|0],x,y);}
  ctx.fillStyle='rgba(255,40,90,.10)';ctx.fillRect(0,gy,W,H-gy);ctx.restore();
  // HUD
  ctx.fillStyle='#fff';ctx.font='700 16px "Segoe UI",sans-serif';ctx.textAlign='left';ctx.fillText(score,12,24);
  ctx.textAlign='right';ctx.fillStyle='#ffe21a';ctx.fillText('1UP',W-12,24);
  ctx.textAlign='left';ctx.font='700 12px "Segoe UI",sans-serif';
  if(chain>1){ctx.fillStyle='#ffd9a0';ctx.fillText('chaîne '+chain,12,42);}
  if(mult>1){ctx.fillStyle='#ff2e88';ctx.fillText('x'+mult,12,58);}
  if(weaponLvl>0){ctx.fillStyle='#ffd400';ctx.fillText('niv.'+weaponLvl,12,74);}
  if(weapon){ctx.fillStyle=WEAPONS[weapon].c;ctx.textAlign='center';ctx.fillText(weapon.toUpperCase(),W/2,42);
    const base=WEAPONS[weapon].dur*(1+weaponLvl*0.2);ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(W/2-30,46,60,4);
    ctx.fillStyle=WEAPONS[weapon].c;ctx.fillRect(W/2-30,46,60*Math.max(0,Math.min(1,weaponT/base)),4);}
  if(powerT>0){ctx.fillStyle='#22d3ee';ctx.textAlign='center';ctx.fillText('POWER',W/2,H-50);}
  if(msgT>0){ctx.save();ctx.globalAlpha=Math.min(1,msgT/30);ctx.fillStyle='#fff';ctx.font='800 22px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.shadowColor='#ffe21a';ctx.shadowBlur=12;ctx.fillText(msg,W/2,H*0.4);ctx.restore();}
  if(paused){ctx.fillStyle='rgba(4,4,11,.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='700 34px "Segoe UI",sans-serif';ctx.textAlign='center';ctx.fillText('PAUSE',W/2,H/2);}
}
function loop(){update();render();requestAnimationFrame(loop);}
// attract
player={px:ccx(5),py:ccy(6),dir:{x:0,y:0},want:{x:0,y:0},speed:2.45,mouth:0.3,cell:{c:5,r:6}};
ghosts=[];effects=[];fireTiles=new Map();tornado=null;cam=player.py-H*0.55;score=0;depthBest=6;
powerT=0;mult=1;multT=0;chain=0;weapon=null;weaponT=0;weaponLvl=0;msgT=0;pelletScore=10;
loop();
if(window.Arcade)Arcade.loadBest('pacman256').then(b=>{if(b&&b>best)best=b;}).catch(()=>{});</script>
