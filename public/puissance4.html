<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>if(!localStorage.getItem('arcade_token'))location.replace('index.html');</script>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Puissance 4</title>
<meta name="theme-color" content="#08080f">
<meta name="color-scheme" content="dark">
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@700&display=swap');
:root{--bg:#08080f;--panel:#0d1b3e;--line:rgba(255,255,255,.1);--ink:#f0f2ff;--mute:#8189a8;
  --p1:#FFD700;--p2:#ff3b3b;--board:#162aaa;--hole:#05060f;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',sans-serif;background:radial-gradient(130% 90% at 50% -10%,#040d28,var(--bg) 55%);
  color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:460px;text-align:center}
.head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px}
.title{font-family:'Anton',sans-serif;font-size:34px;letter-spacing:.04em;text-transform:uppercase;
  background:linear-gradient(95deg,var(--p1),var(--p2));-webkit-background-clip:text;background-clip:text;color:transparent}
.scoreboard{display:flex;gap:10px;font-family:'Space Mono',monospace;align-items:flex-end}
.sc{text-align:right}.sc .lab{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}
.sc .val{font-size:20px;font-weight:700}
.sc.p1 .val{color:var(--p1)}.sc.p2 .val{color:var(--p2)}
.sep{color:var(--mute);font-size:14px;padding-bottom:4px}

/* Modes */
.mode-bar{display:flex;gap:6px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.mode-btn{cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12.5px;
  color:var(--ink);background:#11111d;border:1.5px solid var(--line);border-radius:10px;
  padding:7px 12px;transition:.15s}
.mode-btn.on{border-color:var(--p1);background:rgba(255,215,0,.12);color:var(--p1)}

/* Plateau */
.game-area{background:var(--board);border-radius:16px;padding:10px 10px 12px;
  border:2px solid rgba(255,255,255,.1);box-shadow:0 8px 40px rgba(0,0,50,.6);display:inline-block;width:100%}
.col-bar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px}
.col-btn{cursor:pointer;background:transparent;border:none;color:var(--p1);font-size:18px;
  padding:2px 0;border-radius:8px;transition:.15s;opacity:.4}
.col-btn:hover,.col-btn:focus{opacity:1;background:rgba(255,215,0,.12)}
.col-btn.p2turn{color:var(--p2)}
.col-btn.p2turn:hover{background:rgba(255,59,59,.12)}
.board{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);gap:5px}
.cell{aspect-ratio:1;border-radius:50%;background:var(--hole);
  box-shadow:inset 0 3px 8px rgba(0,0,0,.6);position:relative;overflow:hidden}
.disc{width:100%;height:100%;border-radius:50%;background:var(--hole);
  transition:background-color .05s;}
.disc.p1{background:radial-gradient(circle at 35% 30%,#ffe866,var(--p1) 60%,#c8960a);
  box-shadow:0 0 10px rgba(255,215,0,.5),inset 0 -2px 4px rgba(0,0,0,.25)}
.disc.p2{background:radial-gradient(circle at 35% 30%,#ff7a7a,var(--p2) 60%,#a01010);
  box-shadow:0 0 10px rgba(255,59,59,.5),inset 0 -2px 4px rgba(0,0,0,.25)}
.disc.win{animation:pulse .55s infinite alternate}
@keyframes pulse{from{filter:brightness(1)}to{filter:brightness(1.45) saturate(1.3)}}
.disc.drop{animation:fall var(--dur) ease-in both}
@keyframes fall{0%{transform:translateY(var(--from));opacity:.7}100%{transform:translateY(0);opacity:1}}

/* Statut */
.status{margin-top:14px;font-size:15px;font-weight:600;color:var(--ink);min-height:22px;letter-spacing:.02em}
.status .hi{font-weight:700}

/* Bouton rejouer */
.btn{cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;
  background:linear-gradient(90deg,var(--p1),#ffa500);color:#1a0e00;border:none;
  border-radius:12px;padding:11px 26px;margin-top:12px;box-shadow:0 0 18px rgba(255,215,0,.3)}
.btn:active{transform:scale(.97)}
.hint{color:var(--mute);font-size:12px;margin-top:12px;font-family:'Space Mono',monospace}
.back{position:fixed;top:12px;left:12px;z-index:99;font-size:13px;font-weight:700;text-decoration:none;
  color:#e8f0ff;background:rgba(20,22,30,.66);border:1px solid rgba(255,255,255,.18);
  padding:7px 13px;border-radius:10px;backdrop-filter:blur(6px)}
</style>
</head>
<body>
<a href="index.html" class="back">← Menu</a>
<div class="wrap">
  <div class="head">
    <div class="title">Puissance 4</div>
    <div class="scoreboard">
      <div class="sc p1"><div class="lab" id="l1">Joueur 1</div><div class="val" id="s1">0</div></div>
      <div class="sep">—</div>
      <div class="sc p2"><div class="lab" id="l2">Joueur 2</div><div class="val" id="s2">0</div></div>
    </div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn" data-mode="easy">Facile</button>
    <button class="mode-btn on" data-mode="normal">Normal</button>
    <button class="mode-btn" data-mode="hard">Difficile</button>
    <button class="mode-btn" data-mode="2p">2 Joueurs</button>
  </div>

  <div class="game-area">
    <div class="col-bar" id="colBar"></div>
    <div class="board" id="board"></div>
  </div>

  <div class="status" id="status">Lance une partie !</div>
  <button class="btn" id="restartBtn">Nouvelle partie ▶</button>
  <div class="hint">Clique sur une colonne pour jouer · L'IA joue en rouge</div>
</div>
<script src="auth.js"></script>
<script>
/* ══════════════════════════════════════════════════════════
   PUISSANCE 4 — Facile / Normal / Difficile / 2 joueurs
   IA : minimax + alpha-beta (profondeur 4 / 6 / 9)
   ══════════════════════════════════════════════════════════ */

const ROWS = 6, COLS = 7;
let board, cur, mode = 'normal', over, aiPending;
let wins = [0, 0, 0];   // [_, P1, P2]

// ── DOM ─────────────────────────────────────────────────────
const boardEl   = document.getElementById('board');
const colBarEl  = document.getElementById('colBar');
const statusEl  = document.getElementById('status');
const s1El      = document.getElementById('s1');
const s2El      = document.getElementById('s2');
const l1El      = document.getElementById('l1');
const l2El      = document.getElementById('l2');

// Grille DOM [row][col] = disc div
const discs = Array.from({length:ROWS}, () => new Array(COLS).fill(null));

// ── Construction DOM ──────────────────────────────────────
(function buildDOM() {
  colBarEl.innerHTML = '';
  for (let c = 0; c < COLS; c++) {
    const b = document.createElement('button');
    b.className = 'col-btn'; b.textContent = '▼'; b.dataset.col = c;
    b.addEventListener('click', () => playerPlay(c));
    colBarEl.appendChild(b);
  }
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div'); cell.className = 'cell';
      const disc = document.createElement('div'); disc.className = 'disc';
      cell.appendChild(disc); boardEl.appendChild(cell);
      discs[r][c] = disc;
    }
  }
})();

// ── Sélection du mode ──────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on'); mode = btn.dataset.mode;
    updateLabels(); startGame();
  });
});

function updateLabels() {
  if (mode === '2p') {
    l1El.textContent = 'Joueur 1'; l2El.textContent = 'Joueur 2';
    document.querySelector('.hint').textContent = 'Joueurs alternés · Clique sur la colonne';
  } else {
    l1El.textContent = 'Toi'; l2El.textContent = 'IA';
    const d = mode === 'easy' ? 'Facile' : mode === 'normal' ? 'Normal' : 'Difficile';
    document.querySelector('.hint').textContent = `Mode ${d} · Clique sur une colonne pour jouer`;
  }
}

// ── Logique jeu ────────────────────────────────────────────
function mkBoard() { return Array.from({length:ROWS}, () => new Array(COLS).fill(0)); }

function startGame() {
  board = mkBoard(); cur = 1; over = false; aiPending = false;
  clearDiscs(); updateColBtns(); updateStatus(); restartBtn.textContent = 'Nouvelle partie ▶';
}

function clearDiscs() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) { discs[r][c].className = 'disc'; discs[r][c].style = ''; }
}

function topRow(b, col) {
  for (let r = ROWS - 1; r >= 0; r--) if (b[r][col] === 0) return r;
  return -1;
}

function dropPiece(b, col, player) {
  const r = topRow(b, col);
  if (r === -1) return null;
  const nb = b.map(row => [...row]);
  nb[r][col] = player; return { board: nb, row: r };
}

function playerPlay(col) {
  if (over || aiPending) return;
  if (mode !== '2p' && cur === 2) return;
  const r = topRow(board, col);
  if (r === -1) return;
  board[r][col] = cur;
  animDrop(r, col, cur);
  const won = checkWin(board, cur);
  if (won) { resolveWin(cur, won); return; }
  if (isDraw()) { resolveDraw(); return; }
  cur = 3 - cur; updateColBtns(); updateStatus();
  if (mode !== '2p' && cur === 2) { aiPending = true; setTimeout(doAI, 480); }
}

function doAI() {
  if (over) return;
  const col = getAIMove(board, mode);
  const r = topRow(board, col);
  board[r][col] = 2;
  animDrop(r, col, 2);
  aiPending = false;
  const won = checkWin(board, 2);
  if (won) { resolveWin(2, won); return; }
  if (isDraw()) { resolveDraw(); return; }
  cur = 1; updateColBtns(); updateStatus();
}

function resolveWin(player, cells4) {
  over = true; wins[player]++;
  s1El.textContent = wins[1]; s2El.textContent = wins[2];
  cells4.forEach(([r, c]) => discs[r][c].classList.add('win'));
  const who = mode === '2p' ? `Joueur ${player}` : (player === 1 ? '🎉 Victoire !' : '😅 L\'IA gagne');
  setStatus(who, player === 1 ? 'var(--p1)' : 'var(--p2)');
  updateColBtns(true);
  if (mode !== '2p' && player === 1) Arcade.saveBest('p4_'+mode, wins[1]);
}

function resolveDraw() {
  over = true;
  setStatus('Match nul — bien joué !', 'var(--mute)');
  updateColBtns(true);
}

function isDraw() { return board[0].every(c => c !== 0); }

function animDrop(row, col, player) {
  const disc = discs[row][col];
  // hauteur d'une cellule en px (approximation côté CSS)
  const cellPx = boardEl.clientHeight / ROWS;
  const fromPx = -(row + 1) * cellPx - cellPx * 0.5;
  const dur = Math.max(0.15, row * 0.06) + 's';
  disc.style.setProperty('--from', `${fromPx}px`);
  disc.style.setProperty('--dur', dur);
  disc.className = 'disc drop ' + (player === 1 ? 'p1' : 'p2');
  disc.addEventListener('animationend', () => {
    disc.style.removeProperty('--from'); disc.style.removeProperty('--dur');
    disc.className = 'disc ' + (player === 1 ? 'p1' : 'p2');
  }, { once: true });
}

function updateStatus() {
  if (over) return;
  const c = cur === 1 ? 'var(--p1)' : 'var(--p2)';
  const who = mode === '2p'
    ? `Joueur ${cur}`
    : (cur === 1 ? 'À ton tour' : 'L\'IA réfléchit…');
  setStatus(who, c);
}

function setStatus(txt, col) {
  statusEl.innerHTML = `<span class="hi" style="color:${col}">${txt}</span>`;
}

function updateColBtns(disabled = false) {
  colBarEl.querySelectorAll('.col-btn').forEach((b, i) => {
    b.disabled = disabled || over || (mode !== '2p' && cur === 2);
    b.className = 'col-btn' + (cur === 2 ? ' p2turn' : '');
    if (board[0][i] !== 0) b.style.opacity = '.15';
    else b.style.opacity = '';
  });
}

// ── Détection victoire ─────────────────────────────────────
function checkWin(b, player) {
  // Horizontal
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c <= COLS - 4; c++)
      if ([0,1,2,3].every(i => b[r][c+i] === player))
        return [[r,c],[r,c+1],[r,c+2],[r,c+3]];
  // Vertical
  for (let c = 0; c < COLS; c++)
    for (let r = 0; r <= ROWS - 4; r++)
      if ([0,1,2,3].every(i => b[r+i][c] === player))
        return [[r,c],[r+1,c],[r+2,c],[r+3,c]];
  // Diagonale \
  for (let r = 0; r <= ROWS - 4; r++)
    for (let c = 0; c <= COLS - 4; c++)
      if ([0,1,2,3].every(i => b[r+i][c+i] === player))
        return [[r,c],[r+1,c+1],[r+2,c+2],[r+3,c+3]];
  // Diagonale /
  for (let r = 3; r < ROWS; r++)
    for (let c = 0; c <= COLS - 4; c++)
      if ([0,1,2,3].every(i => b[r-i][c+i] === player))
        return [[r,c],[r-1,c+1],[r-2,c+2],[r-3,c+3]];
  return null;
}

// ── IA — minimax + alpha-beta ──────────────────────────────
const DEPTHS = { easy: 2, normal: 6, hard: 9 };
const ORDER  = [3, 2, 4, 1, 5, 0, 6];  // centre en premier (meilleure alpha-beta)

function getAIMove(b, diff) {
  const valid = ORDER.filter(c => topRow(b, c) !== -1);
  if (!valid.length) return 0;

  // Facile : 60 % aléatoire, 40 % coup intelligent
  if (diff === 'easy') {
    if (Math.random() < 0.6) return valid[Math.floor(Math.random() * valid.length)];
    // Essaie de gagner ou bloquer
    for (const c of valid) { const r=topRow(b,c); if(r===-1) continue; const nb=b.map(row=>[...row]); nb[r][c]=2; if(checkWin(nb,2)) return c; }
    for (const c of valid) { const r=topRow(b,c); if(r===-1) continue; const nb=b.map(row=>[...row]); nb[r][c]=1; if(checkWin(nb,1)) return c; }
    return valid[Math.floor(Math.random() * valid.length)];
  }

  const depth = DEPTHS[diff] || 6;
  const res = minimax(b, depth, -Infinity, Infinity, true);
  return res.col !== -1 ? res.col : valid[0];
}

function isTerminal(b) {
  return checkWin(b,1) !== null || checkWin(b,2) !== null || topRow(b,3) === -1 && b[0].every(c=>c!==0);
}

function scoreBoard(b) {
  let s = 0;
  // Centre
  const center = [0,1,2,3,4,5].map(r => b[r][3]);
  s += center.filter(c => c===2).length * 4;

  function evalWindow(w) {
    const cnt2=w.filter(c=>c===2).length, cnt1=w.filter(c=>c===1).length, cntE=w.filter(c=>c===0).length;
    if (cnt2===4) s+=200;
    else if (cnt2===3&&cntE===1) s+=8;
    else if (cnt2===2&&cntE===2) s+=2;
    if (cnt1===3&&cntE===1) s-=7;
    if (cnt1===4) s-=200;
  }

  // Horizontal
  for (let r=0;r<ROWS;r++) for(let c=0;c<=COLS-4;c++) evalWindow([b[r][c],b[r][c+1],b[r][c+2],b[r][c+3]]);
  // Vertical
  for (let c=0;c<COLS;c++) for(let r=0;r<=ROWS-4;r++) evalWindow([b[r][c],b[r+1][c],b[r+2][c],b[r+3][c]]);
  // Diagonales
  for (let r=0;r<=ROWS-4;r++) for(let c=0;c<=COLS-4;c++) evalWindow([b[r][c],b[r+1][c+1],b[r+2][c+2],b[r+3][c+3]]);
  for (let r=3;r<ROWS;r++) for(let c=0;c<=COLS-4;c++) evalWindow([b[r][c],b[r-1][c+1],b[r-2][c+2],b[r-3][c+3]]);
  return s;
}

function minimax(b, depth, alpha, beta, maximizing) {
  if (checkWin(b, 2)) return { score: 100000 + depth, col: -1 };
  if (checkWin(b, 1)) return { score: -100000 - depth, col: -1 };
  const valid = ORDER.filter(c => topRow(b, c) !== -1);
  if (depth === 0 || valid.length === 0) return { score: scoreBoard(b), col: -1 };

  let best = { score: maximizing ? -Infinity : Infinity, col: valid[0] };
  for (const col of valid) {
    const r = topRow(b, col);
    const nb = b.map(row => [...row]); nb[r][col] = maximizing ? 2 : 1;
    const child = minimax(nb, depth - 1, alpha, beta, !maximizing);
    if (maximizing) {
      if (child.score > best.score) best = { score: child.score, col };
      alpha = Math.max(alpha, best.score);
    } else {
      if (child.score < best.score) best = { score: child.score, col };
      beta = Math.min(beta, best.score);
    }
    if (alpha >= beta) break;
  }
  return best;
}

// ── Restart ────────────────────────────────────────────────
const restartBtn = document.getElementById('restartBtn');
restartBtn.addEventListener('click', startGame);

// ── Init ───────────────────────────────────────────────────
updateLabels();
startGame();
</script>
</body>
</html>
