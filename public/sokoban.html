<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<script>if(!localStorage.getItem('arcade_token'))location.replace('index.html');</script>
<title>Sokoban</title>
<meta name="theme-color" content="#06070e">
<meta name="color-scheme" content="dark">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none}
html,body{width:100%;min-height:100%;font-family:'Segoe UI',system-ui,Arial,sans-serif;
  background:radial-gradient(120% 90% at 50% -10%,#162038,#06070e 60%);
  color:#f0f2ff;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px;overflow-x:hidden;touch-action:none}
body{min-height:100vh;min-height:100dvh}
.back{position:fixed;top:10px;left:10px;z-index:99;font-size:13px;font-weight:700;text-decoration:none;
  color:#e8f0ff;background:rgba(20,22,30,.66);border:1px solid rgba(255,255,255,.18);
  padding:7px 13px;border-radius:10px;backdrop-filter:blur(6px)}
.title{font-size:26px;font-weight:800;letter-spacing:.05em;
  background:linear-gradient(95deg,#ffb14e,#ff7a3d);
  -webkit-background-clip:text;background-clip:text;color:transparent}
.bar{display:flex;gap:18px;align-items:center;margin:6px 0 8px;font-variant-numeric:tabular-nums}
.bar .item{text-align:center;min-width:54px}
.bar .v{font-size:20px;font-weight:700}
.bar .l{font-size:9px;color:#8189a8;letter-spacing:.14em;text-transform:uppercase;margin-top:1px}

.board-wrap{position:relative;border-radius:14px;overflow:hidden;
  border:1px solid rgba(255,255,255,.1);background:#0a0c14;padding:8px}
canvas{display:block;image-rendering:auto;width:min(360px,86vw,52vh);height:auto}

.win{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,10,18,.92);backdrop-filter:blur(4px);gap:8px;padding:20px;text-align:center;border-radius:14px}
.win.show{display:flex}
.win h2{font-size:26px;font-weight:800;color:#39ff9e}
.win p{color:#8189a8;font-size:14px}

.controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.btn{cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;color:#f0f2ff;
  background:#11111d;border:1.5px solid rgba(255,255,255,.12);border-radius:11px;padding:9px 16px;
  transition:transform .08s,border-color .15s}
.btn:active{transform:scale(.96)}
.btn.primary{background:#ffb14e;color:#1a0e00;border-color:#ffb14e;box-shadow:0 0 18px rgba(255,177,78,.3)}
.btn:disabled{opacity:.4;cursor:default}

/* D-pad tactile */
.dpad{display:grid;grid-template-columns:repeat(3,46px);grid-template-rows:repeat(3,46px);
  gap:5px;margin-top:10px}
.dpad div{display:flex;align-items:center;justify-content:center}
.dkey{cursor:pointer;background:rgba(255,177,78,.08);border:1.5px solid rgba(255,177,78,.3);
  border-radius:12px;color:#ffb14e;font-size:20px;width:46px;height:46px;
  display:flex;align-items:center;justify-content:center;touch-action:none}
.dkey:active{background:rgba(255,177,78,.25)}
.hint{color:#8189a8;font-size:11px;margin-top:8px;text-align:center;font-family:monospace}
</style>
</head>
<body>
  <a href="index.html" class="back">← Menu</a>
  <div class="title">SOKOBAN</div>
  <div class="bar">
    <div class="item"><div class="v" id="lvlV">1</div><div class="l">Niveau</div></div>
    <div class="item"><div class="v" id="moveV">0</div><div class="l">Coups</div></div>
    <div class="item"><div class="v" id="boxV">0/0</div><div class="l">Caisses</div></div>
  </div>

  <div class="board-wrap">
    <canvas id="cv" width="400" height="400"></canvas>
    <div class="win" id="winScreen">
      <h2 id="winTitle">Niveau résolu !</h2>
      <p id="winText"></p>
      <button class="btn primary" id="nextBtn">Niveau suivant ▶</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="undoBtn">↶ Annuler</button>
    <button class="btn" id="resetBtn">↻ Recommencer</button>
    <button class="btn" id="prevBtn">◀ Préc.</button>
    <button class="btn" id="skipBtn">Suiv. ▶</button>
  </div>

  <div class="dpad">
    <div></div><div><div class="dkey" id="kUp">▲</div></div><div></div>
    <div><div class="dkey" id="kLeft">◀</div></div>
    <div></div>
    <div><div class="dkey" id="kRight">▶</div></div>
    <div></div><div><div class="dkey" id="kDown">▼</div></div><div></div>
  </div>

  <div class="hint">Flèches / ZQSD · U = annuler · R = recommencer</div>

<script src="auth.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   SOKOBAN — pousse les caisses sur les cibles
   Légende des niveaux :
     # mur · @ joueur · $ caisse · . cible
     * caisse sur cible · + joueur sur cible · (espace) sol
   ════════════════════════════════════════════════════════════ */

const LEVELS = [
  // 1 — tutoriel
  [
    "########",
    "#      #",
    "#  $.  #",
    "#  @   #",
    "#      #",
    "########",
  ],
  // 2 — deux caisses
  [
    "########",
    "#  .   #",
    "# $$.  #",
    "#  @   #",
    "########",
  ],
  // 3 — couloir
  [
    "#########",
    "#.      #",
    "#.$$@   #",
    "#.$     #",
    "#########",
  ],
  // 4 — carré
  [
    "########",
    "#  ..  #",
    "# $$   #",
    "# @    #",
    "########",
  ],
  // 5 — angles
  [
    "#######",
    "#  .  #",
    "# $$$ #",
    "# . . #",
    "#  @  #",
    "#######",
  ],
  // 6 — symétrie
  [
    "########",
    "#  ..  #",
    "#  $$  #",
    "## @  ##",
    "#  $$  #",
    "#  ..  #",
    "########",
  ],
  // 7 — décalage
  [
    "########",
    "#   #. #",
    "# $$$  #",
    "#  @   #",
    "# .  . #",
    "########",
  ],
  // 8 — serpentin
  [
    "##########",
    "#    @   #",
    "# $#$#$#  #",
    "# .   .  .#",
    "##########",
  ],
  // 9 — chambre
  [
    "#######",
    "#. .  #",
    "# $$# #",
    "#  $  #",
    "#  .@ #",
    "#######",
  ],
  // 10 — ligne
  [
    "#########",
    "#@      #",
    "# $$$   #",
    "# . . . #",
    "#       #",
    "#########",
  ],
  // 11 — bloc symétrique
  [
    "##########",
    "#   ..   #",
    "#  $$$$  #",
    "#  ..    #",
    "#   @    #",
    "##########",
  ],
  // 12 — final
  [
    "##########",
    "#  ....  #",
    "# $$$$   #",
    "#   @    #",
    "#        #",
    "##########",
  ],
];

// ── Tiles couleurs ─────────────────────────────────────────
const COL = {
  wall:'#3a4a6a', wallTop:'#4d6090', floor:'#171c2c', floorAlt:'#1b2133',
  target:'#ff5a5f', box:'#caa15a', boxTop:'#e0bf7a', boxOnTarget:'#5ec06a',
  boxOnTargetTop:'#7fe08c', player:'#4dd0ff', playerDark:'#2a8fc0',
};

// ── État ───────────────────────────────────────────────────
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let level = 0;        // index 0-based
let grid;             // matrice de caractères statiques (#, ., sol)
let boxes;            // Set "r,c"
let targets;          // Set "r,c"
let player;           // {r,c}
let moves, history;
let TS, OX, OY, ROWS, COLS;
let solved = false;

let maxUnlocked = parseInt(localStorage.getItem('sokoban_max')||'0'); // dernier niveau résolu

const lvlV  = document.getElementById('lvlV');
const moveV = document.getElementById('moveV');
const boxV  = document.getElementById('boxV');
const winScreen = document.getElementById('winScreen');
const winText = document.getElementById('winText');
const undoBtn = document.getElementById('undoBtn');

// ── Chargement d'un niveau ─────────────────────────────────
function load(idx){
  level = (idx + LEVELS.length) % LEVELS.length;
  const raw = LEVELS[level];
  ROWS = raw.length;
  COLS = Math.max(...raw.map(r => r.length));
  grid = [];
  boxes = new Set();
  targets = new Set();
  for(let r=0;r<ROWS;r++){
    const row = [];
    for(let c=0;c<COLS;c++){
      const ch = raw[r][c] || ' ';
      if(ch==='#'){ row.push('#'); }
      else { row.push(' '); }
      if(ch==='.'||ch==='*'||ch==='+') targets.add(r+','+c);
      if(ch==='$'||ch==='*') boxes.add(r+','+c);
      if(ch==='@'||ch==='+') player = {r,c};
    }
    grid.push(row);
  }
  moves = 0;
  history = [];
  solved = false;

  // Taille des tuiles pour tenir dans 400×400
  const pad = 8;
  TS = Math.floor(Math.min((400-pad*2)/COLS, (400-pad*2)/ROWS));
  OX = Math.floor((400 - TS*COLS)/2);
  OY = Math.floor((400 - TS*ROWS)/2);

  winScreen.classList.remove('show');
  updateHUD();
  draw();
}

// ── HUD ────────────────────────────────────────────────────
function updateHUD(){
  lvlV.textContent = level+1;
  moveV.textContent = moves;
  let on = 0;
  for(const t of targets) if(boxes.has(t)) on++;
  boxV.textContent = on+'/'+targets.size;
  undoBtn.disabled = history.length===0;
}

// ── Déplacement ────────────────────────────────────────────
const DIRS = { up:[-1,0], down:[1,0], left:[0,-1], right:[0,1] };

function move(dir){
  if(solved) return;
  const [dr,dc] = DIRS[dir];
  const nr = player.r+dr, nc = player.c+dc;
  if(grid[nr] === undefined || grid[nr][nc] === undefined) return;
  if(grid[nr][nc]==='#') return;  // mur

  const key = nr+','+nc;
  if(boxes.has(key)){
    // Pousser la caisse
    const br = nr+dr, bc = nc+dc;
    if(grid[br]===undefined || grid[br][bc]==='#') return;        // mur derrière
    if(boxes.has(br+','+bc)) return;                              // caisse derrière
    // sauvegarde pour annulation
    history.push({ player:{...player}, box:key });
    boxes.delete(key);
    boxes.add(br+','+bc);
    player = {r:nr, c:nc};
  } else {
    history.push({ player:{...player}, box:null });
    player = {r:nr, c:nc};
  }
  moves++;
  updateHUD();
  draw();
  checkWin();
}

function undo(){
  const last = history.pop();
  if(!last) return;
  if(last.box){
    // la caisse était poussée depuis last.box vers la case du joueur actuel
    const pushedTo = player.r+','+player.c;
    boxes.delete(pushedTo);
    boxes.add(last.box);
  }
  player = last.player;
  moves = Math.max(0, moves-1);
  updateHUD();
  draw();
}

// ── Victoire ───────────────────────────────────────────────
function checkWin(){
  for(const t of targets) if(!boxes.has(t)) return;
  solved = true;
  if(level >= maxUnlocked){
    maxUnlocked = level+1;
    localStorage.setItem('sokoban_max', maxUnlocked);
    if(window.Arcade) Arcade.saveBest('sokoban', maxUnlocked);
  }
  const last = level === LEVELS.length-1;
  document.getElementById('winTitle').textContent = last ? '🏆 Tous les niveaux résolus !' : 'Niveau résolu !';
  winText.textContent = `${moves} coups · niveau ${level+1}`;
  document.getElementById('nextBtn').textContent = last ? 'Recommencer ↻' : 'Niveau suivant ▶';
  setTimeout(()=> winScreen.classList.add('show'), 280);
}

// ── Rendu ──────────────────────────────────────────────────
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function draw(){
  ctx.clearRect(0,0,400,400);

  // Sol + murs
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x = OX+c*TS, y = OY+r*TS;
      if(grid[r][c]==='#'){
        ctx.fillStyle = COL.wall;
        rr(x+1,y+1,TS-2,TS-2,3); ctx.fill();
        ctx.fillStyle = COL.wallTop;
        rr(x+1,y+1,TS-2,TS*0.32,3); ctx.fill();
      } else {
        // sol en damier
        ctx.fillStyle = (r+c)%2===0 ? COL.floor : COL.floorAlt;
        ctx.fillRect(x,y,TS,TS);
      }
    }
  }

  // Cibles
  for(const t of targets){
    const [r,c] = t.split(',').map(Number);
    const x = OX+c*TS, y = OY+r*TS;
    if(!boxes.has(t)){
      ctx.fillStyle = COL.target;
      ctx.globalAlpha = 0.85;
      // losange-cible
      ctx.save();
      ctx.translate(x+TS/2, y+TS/2);
      ctx.beginPath();
      const s = TS*0.16;
      ctx.moveTo(0,-s); ctx.lineTo(s,0); ctx.lineTo(0,s); ctx.lineTo(-s,0); ctx.closePath();
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  // Caisses
  for(const b of boxes){
    const [r,c] = b.split(',').map(Number);
    const x = OX+c*TS, y = OY+r*TS;
    const onTarget = targets.has(b);
    const m = TS*0.12;
    ctx.fillStyle = onTarget ? COL.boxOnTarget : COL.box;
    rr(x+m, y+m, TS-2*m, TS-2*m, 3); ctx.fill();
    // face supérieure
    ctx.fillStyle = onTarget ? COL.boxOnTargetTop : COL.boxTop;
    rr(x+m, y+m, TS-2*m, (TS-2*m)*0.32, 3); ctx.fill();
    // croix de la caisse
    ctx.strokeStyle = 'rgba(0,0,0,.25)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x+m, y+m); ctx.lineTo(x+TS-m, y+TS-m);
    ctx.moveTo(x+TS-m, y+m); ctx.lineTo(x+m, y+TS-m);
    ctx.stroke();
    if(onTarget){
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.font=`bold ${TS*0.3}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('✓', x+TS/2, y+TS/2+1);
    }
  }

  // Joueur
  const px = OX+player.c*TS, py = OY+player.r*TS;
  const cx = px+TS/2, cy = py+TS/2, rad = TS*0.32;
  ctx.fillStyle = COL.player;
  ctx.beginPath(); ctx.arc(cx,cy,rad,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = COL.playerDark;
  ctx.beginPath(); ctx.arc(cx,cy+rad*0.35,rad,Math.PI*0.15,Math.PI*0.85); ctx.fill();
  // yeux
  ctx.fillStyle = '#fff';
  const ey = TS*0.08;
  ctx.beginPath(); ctx.arc(cx-rad*0.35,cy-rad*0.2,ey,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+rad*0.35,cy-rad*0.2,ey,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a2a3a';
  ctx.beginPath(); ctx.arc(cx-rad*0.35,cy-rad*0.2,ey*0.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+rad*0.35,cy-rad*0.2,ey*0.5,0,Math.PI*2); ctx.fill();
}

// ── Contrôles ──────────────────────────────────────────────
const KEYS = {
  ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
  z:'up', s:'down', q:'left', d:'right',
  w:'up', a:'left',
};
addEventListener('keydown', e=>{
  const k = e.key.length===1 ? e.key.toLowerCase() : e.key;
  if(KEYS[k]){ e.preventDefault(); move(KEYS[k]); return; }
  if(k==='u'){ undo(); }
  if(k==='r'){ load(level); }
});

// Boutons
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('resetBtn').addEventListener('click', ()=> load(level));
document.getElementById('prevBtn').addEventListener('click', ()=> load(level-1));
document.getElementById('skipBtn').addEventListener('click', ()=> load(level+1));
document.getElementById('nextBtn').addEventListener('click', ()=> load(level+1));

// D-pad
function bindKey(id, dir){
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', e=>{ e.preventDefault(); move(dir); });
}
bindKey('kUp','up'); bindKey('kDown','down'); bindKey('kLeft','left'); bindKey('kRight','right');

// Swipe sur le canvas
let sx=0, sy=0, swiping=false;
cv.addEventListener('pointerdown', e=>{ sx=e.clientX; sy=e.clientY; swiping=true; });
cv.addEventListener('pointerup', e=>{
  if(!swiping) return; swiping=false;
  const dx=e.clientX-sx, dy=e.clientY-sy;
  if(Math.abs(dx)+Math.abs(dy) < 24) return;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

// ── Démarrage : reprendre au premier niveau non résolu ─────
// ── Démarrage : reprendre au premier niveau non résolu ─────
// La progression en base prime sur le localStorage si elle est plus avancée.
if(window.Arcade){
  Arcade.loadBest('sokoban').then(b=>{
    if(b && b > maxUnlocked){
      maxUnlocked = b;
      localStorage.setItem('sokoban_max', maxUnlocked);
      load(Math.min(maxUnlocked, LEVELS.length-1));
    }
  }).catch(()=>{});
}
load(Math.min(maxUnlocked, LEVELS.length-1));
</script>
</body>
</html>
